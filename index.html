<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字母拼圖 - 本地&網頁通用版</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --error: #d93025; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: var(--bg); padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 2.2rem; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .hidden { display: none !important; }
        h1 { color: var(--primary); font-size: 1.8rem; margin: 0 0 10px 0; }
        
        /* 狀態列設計 */
        .status-box { padding: 15px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem; border: 1px solid #ddd; }
        .status-loading { background: #e8f0fe; color: #1967d2; border-color: #d2e3fc; }
        .status-manual { background: #fff4e5; color: #663c00; border-color: #ffe1bb; border: 2px dashed #ff9800; }
        .status-ok { background: #e6f4ea; color: #137333; border-color: #ceead6; }

        .settings-group { background: #f1f3f4; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #e0e0e0; text-align: left; }
        .group-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: #5f6368; text-transform: uppercase; }
        
        select, input[type="number"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #dadce0; font-size: 1rem; margin-top: 5px; box-sizing: border-box; }
        .range-inputs { display: flex; align-items: center; gap: 8px; }
        
        button { padding: 12px 24px; font-size: 1rem; cursor: pointer; border-radius: 12px; border: none; transition: 0.2s; font-weight: 600; width: 100%; }
        .btn-main { background: var(--primary); color: white; margin-bottom: 12px; }
        .btn-main:disabled { background: #dadce0; color: #70757a; cursor: not-allowed; }
        .btn-outline { background: white; border: 2px solid #dadce0; color: #3c4043; margin-bottom: 12px; }
        
        /* 遊戲介面 */
        .chinese-hint { font-size: 1.8rem; font-weight: 700; margin: 15px 0; color: #202124; min-height: 2.2rem; }
        .spell-display { font-size: 2.4rem; border-bottom: 3px solid var(--primary); margin: 15px auto; min-height: 3.5rem; letter-spacing: 4px; color: var(--primary); font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .letter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .letter-btn { padding: 15px 5px; font-size: 1.4rem; background: #fff; border: 2px solid #dadce0; border-radius: 10px; cursor: pointer; box-shadow: 0 3px 0 #dadce0; }
        .letter-btn:active { transform: translateY(2px); box-shadow: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.2s both; }
    </style>
</head>
<body>

<div class="card" id="home-screen">
    <h1>單字拼圖挑戰</h1>
    
    <div id="status-container" class="status-box status-loading">
        <div id="status-text">🔍 正在尋找單字庫...</div>
        <div id="manual-area" class="hidden" style="margin-top:10px;">
            <input type="file" id="file-input" accept=".txt" onchange="handleFile(this)" style="font-size: 0.8rem;">
        </div>
    </div>

    <div class="settings-group">
        <div class="group-title">1. 選擇等級</div>
        <select id="level-select" onchange="updateRange()">
            <option value="">請先讀取單字庫</option>
        </select>
    </div>

    <div class="settings-group">
        <div class="group-title">2. 測驗範圍</div>
        <div class="range-inputs">
            <input type="number" id="range-start" value="1">
            <span>至</span>
            <input type="number" id="range-end" value="10">
        </div>
        <p id="level-info" style="font-size: 0.75rem; color: #70757a; margin-top: 8px;"></p>
    </div>

    <div class="settings-group">
        <div class="group-title">3. 語音設定</div>
        <select id="voice-select"><option value="">讀取語音引擎中...</option></select>
    </div>

    <button class="btn-main" id="start-btn" onclick="startQuiz()" disabled>尚未準備就緒</button>
</div>

<div class="card hidden" id="quiz-screen">
    <div id="progress-text" style="font-size: 0.9rem; color: #70757a;">剩餘：--</div>
    <button onclick="speakWord()" style="font-size: 3.5rem; background:none; border:none; cursor:pointer; padding: 5px;">🔊</button>
    <div class="chinese-hint" id="chinese-display"></div>
    <div class="spell-display" id="current-spelling"></div>
    <div class="letter-grid" id="letter-buttons"></div>
    <div style="display: flex; gap: 10px; margin-top: 25px;">
        <button class="btn-outline" onclick="backspace()">退格</button>
        <button class="btn-outline" onclick="clearSpelling()">清除</button>
    </div>
    <div id="message-box" style="margin-top:10px; font-weight:bold; min-height:1.5rem;"></div>
</div>

<div class="card hidden" id="result-screen">
    <h2>測驗完成！</h2>
    <div id="stats-info" style="margin: 20px 0; font-size: 1.1rem; line-height: 1.8;"></div>
    <button class="btn-main" onclick="location.reload()">回首頁</button>
</div>

<script>
    let wordBank = {}; 
    let currentQuestions = [];
    let initialCount = 0;
    let totalAttempts = 0;
    let userSpelling = "";
    let wrongCount = 0;
    let isQuizActive = false;

    // --- 1. 核心載入邏輯 ---
    async function init() {
        initVoices();
        
        // 如果是本地開啟 (file://)，直接顯示手動上傳
        if (window.location.protocol === 'file:') {
            showManualMode("偵測到本地開啟：請選取「單字庫.TXT」");
        } else {
            // 如果是 GitHub Pages，嘗試自動讀取
            try {
                const res = await fetch(`單字庫.TXT?t=${Date.now()}`);
                if (!res.ok) throw new Error();
                const text = await res.text();
                parseData(text);
                setStatus("✅ 單字庫自動連線成功！", "status-ok");
            } catch (e) {
                showManualMode("⚠️ 無法自動連線單字庫，請手動選取");
            }
        }
    }

    function showManualMode(msg) {
        setStatus(msg, "status-manual");
        document.getElementById('manual-area').classList.remove('hidden');
    }

    function setStatus(msg, className) {
        const container = document.getElementById('status-container');
        document.getElementById('status-text').textContent = msg;
        container.className = `status-box ${className}`;
    }

    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            parseData(e.target.result);
            setStatus(`✅ 已手動讀取：${file.name}`, "status-ok");
        };
        reader.readAsText(file);
    }

    function parseData(text) {
        const lines = text.split(/\r?\n/);
        wordBank = {};
        
        lines.forEach(line => {
            let clean = line.replace(/\/gi, '').trim();
            if (!clean || clean.startsWith('等級')) return;
            
            const [lvl, en, zh] = clean.split(',').map(s => s?.trim());
            if (lvl && en && zh) {
                if (!wordBank[lvl]) wordBank[lvl] = [];
                wordBank[lvl].push({ en, zh });
            }
        });

        const lvls = Object.keys(wordBank);
        if (lvls.length > 0) {
            const select = document.getElementById('level-select');
            select.innerHTML = lvls.map(l => `<option value="${l}">${l}</option>`).join('');
            updateRange();
            document.getElementById('start-btn').disabled = false;
            document.getElementById('start-btn').textContent = "開始測驗";
        }
    }

    function updateRange() {
        const lvl = document.getElementById('level-select').value;
        if (!wordBank[lvl]) return;
        const count = wordBank[lvl].length;
        document.getElementById('range-start').value = 1;
        document.getElementById('range-end').value = count;
        document.getElementById('level-info').textContent = `* 該等級共有 ${count} 個單字`;
    }

    // --- 2. 語音系統 ---
    let synth = window.speechSynthesis;
    let voices = [];
    function initVoices() {
        voices = synth.getVoices().filter(v => v.lang.includes('en'));
        const select = document.getElementById('voice-select');
        if (voices.length > 0) {
            select.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
        }
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoices;

    function speakWord() {
        if (!currentQuestions[0]) return;
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(currentQuestions[0].en.replace(/\(.*\)/, ''));
        const vIdx = document.getElementById('voice-select').value;
        if (voices[vIdx]) utter.voice = voices[vIdx];
        utter.rate = document.getElementById('voice-rate').value;
        synth.speak(utter);
    }

    // --- 3. 遊戲邏輯 ---
    function startQuiz() {
        const lvl = document.getElementById('level-select').value;
        const start = Math.max(1, parseInt(document.getElementById('range-start').value)) - 1;
        const end = Math.min(wordBank[lvl].length, parseInt(document.getElementById('range-end').value));
        
        currentQuestions = wordBank[lvl].slice(start, end).sort(() => Math.random() - 0.5);
        if (currentQuestions.length === 0) return alert("範圍錯誤");

        initialCount = currentQuestions.length;
        totalAttempts = 0;
        isQuizActive = true;
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestions.length === 0) return endQuiz();
        userSpelling = ""; wrongCount = 0;
        const data = currentQuestions[0];
        document.getElementById('progress-text').textContent = `進度：${currentQuestions.length} / ${initialCount}`;
        document.getElementById('chinese-display').textContent = data.zh;
        document.getElementById('current-spelling').textContent = "";
        document.getElementById('message-box').textContent = "";
        generateButtons(data.en.toLowerCase());
        speakWord();
    }

    function generateButtons(en) {
        let target = en.replace(/[^a-z]/g, '');
        let letters = target.split('');
        while(letters.length < target.length + 4) letters.push("abcdefghijklmnopqrstuvwxyz"[Math.floor(Math.random()*26)]);
        letters.sort(() => Math.random() - 0.5);
        document.getElementById('letter-buttons').innerHTML = letters.map(c => 
            `<button class="letter-btn" onclick="handleInput('${c}')">${c}</button>`
        ).join('');
    }

    function handleInput(c) {
        if (!isQuizActive) return;
        userSpelling += c;
        document.getElementById('current-spelling').textContent = userSpelling.toUpperCase();
        
        const target = currentQuestions[0].en.toLowerCase().replace(/[^a-z]/g, '');
        if (userSpelling.length === target.length) {
            totalAttempts++;
            if (userSpelling === target) {
                document.getElementById('message-box').textContent = "正確！🌟";
                document.getElementById('message-box').style.color = "var(--success)";
                currentQuestions.shift();
                setTimeout(showQuestion, 800);
            } else {
                wrongCount++;
                const el = document.getElementById('current-spelling');
                el.classList.add('shake');
                setTimeout(() => el.classList.remove('shake'), 200);
                if (wrongCount >= 3) {
                    document.getElementById('message-box').textContent = `正解：${currentQuestions[0].en.toUpperCase()}`;
                    document.getElementById('message-box').style.color = "var(--error)";
                    currentQuestions.push(currentQuestions.shift());
                    setTimeout(showQuestion, 2000);
                } else {
                    userSpelling = ""; el.textContent = "";
                }
            }
        }
    }

    function backspace() { userSpelling = userSpelling.slice(0, -1); document.getElementById('current-spelling').textContent = userSpelling.toUpperCase(); }
    function clearSpelling() { userSpelling = ""; document.getElementById('current-spelling').textContent = ""; }
    
    function endQuiz() {
        isQuizActive = false;
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const score = Math.round((initialCount/totalAttempts)*100);
        document.getElementById('stats-info').innerHTML = `
            測驗等級：${document.getElementById('level-select').value}<br>
            挑戰題數：${initialCount} 題<br>
            總點擊次數：${totalAttempts} 次<br>
            <strong>綜合熟練度：${score}%</strong>
        `;
    }

    window.onload = init;
    window.addEventListener('keydown', (e) => {
        if (!isQuizActive) return;
        if (e.key === 'Backspace') backspace();
        if (e.key.length === 1 && /[a-z]/i.test(e.key)) handleInput(e.key.toLowerCase());
    });
</script>

</body>
</html>
