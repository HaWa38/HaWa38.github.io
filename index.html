<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎈 兒童趣味拼字挑戰 - 通用全螢幕版 🎈</title>
    <style>
        :root { 
            --primary: #FF7043; --secondary: #42A5F5; --success: #66BB6A; 
            --error: #EF5350; --bg: #E0F7FA; --text: #455A64;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        
        body { 
            font-family: 'Comic Sans MS', 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; padding: 10px; overflow: hidden; 
        }
        
        /* 全螢幕適應卡片 */
        .card { 
            background: white; padding: 1.5rem; border-radius: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 100%; max-width: 900px; height: 92vh; 
            display: flex; flex-direction: column;
            text-align: center; position: relative; border: 4px solid white; 
        }
        
        .hidden { display: none !important; }
        
        h1 { color: var(--primary); margin: 0 0 0.5rem 0; font-size: 1.8rem; text-shadow: 2px 2px 0px #ffe0b2; }
        
        .settings-group { 
            background: #FFF3E0; padding: 12px; border-radius: 15px; 
            border: 2px dashed #FFB74D; text-align: left; margin-bottom: 12px; 
        }
        
        .group-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        
        select, input { 
            width: 100%; padding: 10px; border-radius: 10px; 
            border: 2px solid #FFCC80; font-size: 1rem; margin-bottom: 5px; outline: none; 
        }
        
        .btn-mode { 
            flex: 1; background: white; border: 3px solid #FFCC80; 
            color: #8D6E63; padding: 10px; border-radius: 15px; 
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; 
        }
        .btn-mode.active { border-color: var(--primary); background: var(--primary); color: white; transform: scale(1.02); }

        .game-header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 5px; }
        .info-board { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #f5f5f5; padding: 8px 15px; border-radius: 20px; 
            border: 2px solid #eee; margin-bottom: 5px; 
        }
        
        .chinese-hint { font-size: 2.2rem; font-weight: bold; margin: 10px 0; color: var(--secondary); }
        
        .spell-display { 
            font-size: 2.8rem; letter-spacing: 4px; color: var(--text); 
            border-bottom: 4px dashed var(--primary); display: inline-block; 
            min-width: 200px; min-height: 3.5rem; margin-bottom: 15px; font-family: 'Consolas', monospace; 
        }
        
        .letter-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 10px; }
        
        .letter-btn { 
            background: white; border: 3px solid var(--secondary); color: var(--secondary); 
            padding: 15px 2px; border-radius: 15px; font-size: 1.8rem; font-weight: bold; 
            box-shadow: 0 5px 0 var(--secondary); cursor: pointer; 
        }
        .letter-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--secondary); }
        
        .btn-primary { 
            background: var(--success); color: white; width: 100%; padding: 15px; 
            border-radius: 15px; border: none; font-weight: bold; font-size: 1.3rem; 
            margin-top: auto; box-shadow: 0 6px 0 #388E3C; cursor: pointer; 
        }
        
        .btn-tool { background: #BA68C8; color: white; padding: 8px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; flex: 1; font-size: 0.9rem; }
        
        .switch-container { display: flex; align-items: center; justify-content: flex-end; gap: 8px; font-size: 0.9rem; margin-bottom: 5px; color: #666; }
        
        /* 彈窗樣式 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 5000; display: flex; justify-content: center; align-items: center; }
        .modal-content { 
            background: white; width: 90%; max-width: 550px; max-height: 85vh; 
            overflow-y: auto; padding: 25px; border-radius: 25px; text-align: left; 
            position: relative; border: 5px solid var(--secondary); 
        }

        @media (min-width: 600px) {
            .chinese-hint { font-size: 3.8rem; }
            .spell-display { font-size: 4.5rem; }
            .letter-btn { padding: 25px 5px; font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<div class="card" id="login-screen">
    <h1>🎈 兒童趣味拼字 🎈</h1>
    <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
        <div style="background: #FFF3E0; padding: 30px; border-radius: 25px; border: 2px dashed #FFB74D;">
            <label style="font-size: 1.4rem; font-weight: bold; color: var(--primary); display: block; margin-bottom: 15px;">👤 挑戰者 ID：</label>
            <input type="text" id="user-id-input" placeholder="輸入名字" style="font-size: 1.6rem; text-align: center;">
            <button class="btn-tool" style="margin-top:20px; background:#4FC3F7; width:100%; padding:15px; font-size:1.1rem;" onclick="showGuide()">📖 遊戲使用說明</button>
        </div>
    </div>
    <button class="btn-primary" onclick="processLogin()">進入遊戲 ➡️</button>
</div>

<div class="card hidden" id="setup-screen">
    <h1>🎈 遊戲設定 🎈</h1>
    <div id="welcome-msg" style="font-size: 1.2rem; font-weight: bold; color: var(--secondary); margin-bottom: 10px;"></div>
    
    <div class="settings-group">
        <div class="group-title">📚 單字庫與範圍</div>
        <select id="level-select" onchange="onLevelChange()"></select>
        <div style="display: flex; gap: 10px; margin-top: 8px;">
            <input type="number" id="r-start" style="flex:1" placeholder="起點"> <span style="line-height:40px">~</span>
            <input type="number" id="r-end" style="flex:1" placeholder="終點">
            <button class="btn-tool" style="background:#4DB6AC" onclick="previewWords()">📖 預覽</button>
        </div>
    </div>

    <div class="settings-group">
        <div class="group-title">🎯 挑戰模式</div>
        <div style="display: flex; gap: 10px;">
            <button id="btn-mode-all" class="btn-mode active" onclick="setMode('all')">🏆 全部</button>
            <button id="btn-mode-random" class="btn-mode" onclick="setMode('random10')">🎲 隨機10題</button>
        </div>
        <input type="hidden" id="quiz-mode" value="all">
    </div>

    <div class="settings-group">
        <div class="group-title">🗣️ 語音助理 (<span id="platform-label">偵測中</span>)</div>
        <select id="voice-select"></select>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
            <button class="btn-tool" onclick="testVoice()">語音測試 🔊</button>
            <div style="flex: 2; display: flex; align-items: center; gap: 10px; background: white; padding: 0 10px; border-radius: 10px; border: 1px solid #FFCC80;">
                <span style="font-size: 0.8rem; white-space: nowrap;">速度</span>
                <input type="range" id="voice-rate" min="0.5" max="1.5" step="0.1" value="1.0" style="margin:0">
            </div>
        </div>
    </div>
    <button class="btn-primary" id="start-btn" disabled onclick="initGame()">🚀 開始挑戰！</button>
</div>

<div class="card hidden" id="game-screen">
    <div class="game-header">
        <button onclick="location.reload()" style="background:none; border:none; font-size:1.8rem;">🔙</button>
        <div id="quiz-progress" style="font-weight: bold; background: #FFE082; padding: 5px 20px; border-radius: 12px; font-size: 1.1rem;"></div>
        <div></div>
    </div>
    
    <div class="switch-container">
        <span>按鍵發音</span>
        <input type="checkbox" id="key-voice-toggle" checked style="width:22px; height:22px;">
    </div>

    <div class="info-board">
        <div id="hearts-display" style="font-size:1.4rem;">❤️❤️❤️</div>
        <div id="score-display" style="font-weight:bold; color:#FBC02D; font-size: 1.2rem;">⭐ 0</div>
    </div>

    <button onclick="playVoice()" style="font-size: 5rem; background:none; border:none; cursor:pointer; margin: 5px 0;">🔊</button>
    <div class="chinese-hint" id="target-zh"></div>
    <div class="spell-display" id="user-input-display"></div>
    
    <div class="letter-grid" id="keyboard"></div>
    
    <div id="feedback" style="font-weight:bold; min-height:1.5rem; font-size: 1.2rem;"></div>
    
    <div style="display: flex; gap: 15px; margin-top: 5px;">
        <button class="btn-mode" style="background: #FFF9C4;" onclick="backspace()">⬅️ 倒退</button>
        <button class="btn-mode" style="background: #FFEBEE;" onclick="clearInput()">🗑️ 清除</button>
    </div>
</div>

<div class="card hidden" id="result-screen">
    <h1 id="final-stars" style="font-size: 4rem; margin: 20px 0;">⭐⭐⭐</h1>
    <div id="result-body" style="background: #f9f9f9; padding: 30px; border-radius: 25px; border: 3px dashed var(--primary); text-align: left; line-height: 2.2; margin-bottom: 20px; font-size: 1.2rem;"></div>
    <button class="btn-primary" onclick="restartGame()">再玩一次 🚀</button>
</div>

<div id="guide-modal" class="modal hidden" onclick="this.classList.add('hidden')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="color:var(--secondary); text-align: center; margin-top: 0; border-bottom: 3px solid #eee; padding-bottom: 10px;">🌟 挑戰規則</h2>
        <div style="line-height: 2; font-size: 1.1rem; color: #444;">
            <p>1. <strong>聽音辨字：</strong>按 🔊 聽發音，拼出正確英文單字。</p>
            <p>2. <strong>機會限制：</strong>每題有 3 次機會 ❤️，拼錯會扣分。</p>
            <p>3. <strong>錯題重練：</strong>若 3 次都沒拼對，會顯示正確答案，該題會在最後再次出現直到你學會！</p>
            <p>4. <strong>語音輔助：</strong>開啟「按鍵發音」，點擊字母時會跟著唸喔。</p>
        </div>
        <button class="btn-primary" style="margin-top:20px;" onclick="document.getElementById('guide-modal').classList.add('hidden')">我知道了！🚀</button>
    </div>
</div>

<div id="preview-modal" class="modal hidden" onclick="this.classList.add('hidden')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--primary); border-bottom:2px solid #eee; padding-bottom:10px; margin-top:0;">📖 單字清單預覽</h3>
        <div id="preview-list" style="line-height: 1.8; font-size: 1.1rem;"></div>
        <button class="btn-primary" style="margin-top:20px;" onclick="document.getElementById('preview-modal').classList.add('hidden')">關閉</button>
    </div>
</div>

<div id="answer-overlay" class="modal hidden" style="background: rgba(0,0,0,0.96);">
    <div style="text-align: center; color: white;">
        <div style="color: #FFCC80; font-size: 1.6rem; margin-bottom: 25px;">正確答案是：</div>
        <div id="overlay-en" style="font-size: 5rem; font-weight: bold; color: #FFEB3B; font-family: 'Consolas', monospace; letter-spacing: 5px;"></div>
        <div id="overlay-zh" style="font-size: 2.5rem; margin-top: 20px;"></div>
    </div>
</div>

<script>
    let wordData = {}, quizList = [], currentIdx = 0, currentInput = "";
    let attemptsLeft = 3, initialQuizCount = 0, totalAttempts = 0, score = 0;
    let synth = window.speechSynthesis, voices = [];
    let currentUserId = "", startTime;

    function showGuide() { document.getElementById('guide-modal').classList.remove('hidden'); }

    function getPlatform() {
        const ua = navigator.userAgent;
        if (/android/i.test(ua)) return "Android";
        if (/iPad|iPhone|iPod/.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) return "iOS";
        if (/Windows/i.test(ua)) return "Windows";
        return "Generic";
    }

    function initVoices() {
        let allVoices = synth.getVoices();
        const platform = getPlatform();
        document.getElementById('platform-label').innerText = platform;
        let filtered = allVoices.filter(v => v.lang.includes('en') || v.lang.includes('EN'));
        
        if (platform === "Android") filtered = filtered.filter(v => /google|samsung/i.test(v.name));
        else if (platform === "iOS") filtered = filtered.filter(v => !/google/i.test(v.name));
        else if (platform === "Windows") filtered = filtered.filter(v => /microsoft/i.test(v.name));

        voices = filtered.length > 0 ? filtered : allVoices.filter(v => v.lang.includes('en'));
        const select = document.getElementById('voice-select');
        select.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }

    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoices;
    setTimeout(initVoices, 500);

    function testVoice() {
        const utter = new SpeechSynthesisUtterance("Hello! This is a test.");
        utter.voice = voices[document.getElementById('voice-select').value];
        utter.rate = document.getElementById('voice-rate').value;
        synth.speak(utter);
    }

    function processLogin() {
        const id = document.getElementById('user-id-input').value.trim();
        if (!id) return alert("請輸入 ID！");
        currentUserId = id;
        document.getElementById('welcome-msg').innerText = `準備好了嗎？${currentUserId}！`;
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
    }

    async function autoFetchData() {
        try {
            const resp = await fetch('單字庫.TXT');
            const text = await resp.text();
            text.split(/\r?\n/).filter(l => l.trim() && !l.includes("等級")).forEach(line => {
                const p = line.split(',');
                if (p.length >= 3) {
                    if (!wordData[p[0].trim()]) wordData[p[0].trim()] = [];
                    wordData[p[0].trim()].push({ en: p[1].trim(), zh: p.slice(2).join(',').trim() });
                }
            });
            const lvls = Object.keys(wordData);
            document.getElementById('level-select').innerHTML = lvls.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('start-btn').disabled = false;
            onLevelChange();
        } catch (e) { alert("無法讀取單字庫.TXT"); }
    }

    function onLevelChange() {
        const lvl = document.getElementById('level-select').value;
        document.getElementById('r-start').value = 1;
        document.getElementById('r-end').value = wordData[lvl].length;
    }

    function previewWords() {
        const lvl = document.getElementById('level-select').value;
        let s = parseInt(document.getElementById('r-start').value) - 1;
        let e = parseInt(document.getElementById('r-end').value);
        let list = wordData[lvl].slice(s, e);
        document.getElementById('preview-list').innerHTML = list.map((w, i) => `<div>${s+i+1}. <strong>${w.en}</strong> - ${w.zh}</div>`).join('');
        document.getElementById('preview-modal').classList.remove('hidden');
    }

    function setMode(mode) {
        document.getElementById('quiz-mode').value = mode;
        document.getElementById('btn-mode-all').classList.toggle('active', mode === 'all');
        document.getElementById('btn-mode-random').classList.toggle('active', mode === 'random10');
    }

    function initGame() {
        const lvl = document.getElementById('level-select').value;
        const mode = document.getElementById('quiz-mode').value;
        let s = parseInt(document.getElementById('r-start').value) - 1;
        let e = parseInt(document.getElementById('r-end').value);
        let base = wordData[lvl].slice(s, e).sort(() => Math.random() - 0.5);
        quizList = (mode === "random10") ? base.slice(0, 10) : base;
        initialQuizCount = quizList.length; currentIdx = 0; score = 0; totalAttempts = 0;
        startTime = new Date();
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = quizList[currentIdx];
        currentInput = ""; attemptsLeft = 3; updateUI();
        let letters = Array.from(new Set(q.en.replace(/\s/g, '').split('')));
        while (letters.length < 10) {
            let r = String.fromCharCode(97 + Math.floor(Math.random() * 26));
            if (!letters.includes(r)) letters.push(r);
        }
        letters.sort(() => Math.random() - 0.5);
        let kb = letters.map(c => `<button class="letter-btn" onclick="pressKey('${c}')">${c}</button>`).join('');
        if (q.en.includes(" ")) kb += `<button class="letter-btn" style="grid-column: span 2;" onclick="pressKey(' ')">Space</button>`;
        document.getElementById('keyboard').innerHTML = kb;
        setTimeout(playVoice, 500);
    }

    function updateUI() {
        document.getElementById('quiz-progress').innerText = `${currentIdx + 1} / ${quizList.length}`;
        document.getElementById('target-zh').innerText = quizList[currentIdx].zh;
        document.getElementById('hearts-display').innerText = "❤️".repeat(attemptsLeft) + "🖤".repeat(3 - attemptsLeft);
        document.getElementById('score-display').innerText = `⭐ ${score}`;
        document.getElementById('user-input-display').innerText = currentInput.replace(/ /g, "_");
    }

    function pressKey(c) {
        if (document.getElementById('key-voice-toggle').checked && c !== ' ') {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(c);
            utter.voice = voices[document.getElementById('voice-select').value];
            synth.speak(utter);
        }
        const target = quizList[currentIdx].en;
        currentInput += c;
        document.getElementById('user-input-display').innerText = currentInput.replace(/ /g, "_");
        if (currentInput.length === target.length) {
            totalAttempts++;
            if (currentInput === target) {
                score += 10; document.getElementById('feedback').innerText = "太棒了！✨";
                setTimeout(() => { currentIdx++; if (currentIdx >= quizList.length) showResult(); else loadQuestion(); }, 1000);
            } else {
                attemptsLeft--; score = Math.max(0, score - 3);
                if (attemptsLeft > 0) { 
                    document.getElementById('feedback').innerText = "再試一次！❌";
                    setTimeout(() => { currentInput = ""; updateUI(); document.getElementById('feedback').innerText = ""; }, 800);
                } else { showAnswerOverlay(); }
            }
        }
    }

    function showAnswerOverlay() {
        const q = quizList[currentIdx];
        document.getElementById('overlay-en').innerText = q.en;
        document.getElementById('overlay-zh').innerText = q.zh;
        document.getElementById('answer-overlay').classList.remove('hidden');
        quizList.push(q);
        setTimeout(() => { document.getElementById('answer-overlay').classList.add('hidden'); currentIdx++; loadQuestion(); }, 3000);
    }

    function playVoice() {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(quizList[currentIdx].en);
        utter.voice = voices[document.getElementById('voice-select').value];
        utter.rate = document.getElementById('voice-rate').value;
        synth.speak(utter);
    }

    function showResult() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const duration = Math.floor((new Date() - startTime) / 1000);
        const acc = Math.round((initialQuizCount / totalAttempts) * 100) || 0;
        let starStr = acc >= 85 ? "⭐⭐⭐" : (acc >= 60 ? "⭐⭐" : "⭐");
        document.getElementById('final-stars').innerText = starStr;
        document.getElementById('result-body').innerHTML = `
            👤 挑戰者：${currentUserId}<br>
            ⏱️ 總耗時：${duration} 秒<br>
            📈 正確率：${acc}%<br>
            🏆 總積分：${score} 分
        `;
    }

    function restartGame() {
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
    }

    function backspace() { currentInput = currentInput.slice(0, -1); updateUI(); }
    function clearInput() { currentInput = ""; updateUI(); }
    window.onload = autoFetchData;
</script>
</body>
</html>
