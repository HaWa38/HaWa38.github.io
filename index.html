<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎈 兒童趣味拼字挑戰 🎈</title>
    <style>
        :root { 
            --primary: #FF7043; 
            --secondary: #42A5F5; 
            --success: #66BB6A; 
            --error: #EF5350; 
            --bg: #E0F7FA; 
            --text: #455A64;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Comic Sans MS', 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .card { background: white; padding: 1.5rem; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 480px; text-align: center; position: relative; border: 4px solid white; }
        .hidden { display: none !important; }
        
        h1 { color: var(--primary); margin: 0 0 1rem 0; font-size: 1.8rem; text-shadow: 2px 2px 0px #ffe0b2; }
        
        .settings-group { background: #FFF3E0; padding: 12px; border-radius: 15px; border: 2px dashed #FFB74D; text-align: left; margin-bottom: 15px; }
        .group-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        select, input[type="number"], input[type="range"] { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid #FFCC80; font-size: 1rem; margin-bottom: 5px; outline: none; }
        
        .btn-mode { flex: 1; background: white; border: 3px solid #FFCC80; color: #8D6E63; padding: 10px; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-mode.active { border-color: var(--primary); background: var(--primary); color: white; transform: scale(1.05); box-shadow: 0 5px 15px rgba(255, 112, 67, 0.3); }

        .game-header { display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; width: 100%; margin-bottom: 10px; }
        .info-board { display: flex; justify-content: space-between; align-items: center; background: #f5f5f5; padding: 10px 15px; border-radius: 20px; margin-bottom: 15px; border: 2px solid #eee; }
        .score-display { font-size: 1.2rem; font-weight: bold; color: #FBC02D; text-shadow: 1px 1px 0px #FFF; transition: color 0.3s; }
        .hearts-display { font-size: 1.2rem; letter-spacing: 2px; }

        .chinese-hint { font-size: 2rem; font-weight: bold; margin: 10px 0; color: var(--secondary); text-shadow: 1px 1px 0px #bbdefb; }
        .spell-display { font-size: 2.5rem; letter-spacing: 4px; color: var(--text); border-bottom: 4px dashed var(--primary); display: inline-block; min-width: 200px; min-height: 3.2rem; margin-bottom: 15px; white-space: pre; font-family: 'Consolas', monospace; }
        
        .letter-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .letter-btn { background: white; border: 3px solid var(--secondary); color: var(--secondary); padding: 12px 2px; border-radius: 15px; font-size: 1.6rem; font-weight: bold; box-shadow: 0 6px 0 var(--secondary); transition: 0.1s; cursor: pointer; }
        .letter-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--secondary); }
        
        .btn-primary { background: var(--success); color: white; width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.2rem; margin-top: 5px; box-shadow: 0 6px 0 #388E3C; cursor: pointer; }
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); width: 100%; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-secondary { background: white; border: 2px solid #B0BEC5; color: #546E7A; padding: 10px; border-radius: 12px; font-size: 1rem; font-weight: bold; box-shadow: 0 4px 0 #B0BEC5; cursor: pointer; }

        /* 醒目答案遮罩 */
        .answer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 3000; color: white; animation: fadeIn 0.3s ease-out; }
        .answer-label { font-size: 1.5rem; color: #FFCC80; margin-bottom: 20px; font-weight: bold; }
        .answer-big-text { font-size: 5rem; font-weight: bold; color: #FFEB3B; text-shadow: 0 0 20px rgba(255,235,59,0.7); letter-spacing: 6px; font-family: 'Consolas', monospace; }
        .answer-sub { font-size: 2rem; margin-top: 15px; color: #FFF; opacity: 0.9; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-8px);} 75% {transform: translateX(8px);} }
        .shake-anim { animation: shake 0.3s ease-in-out; }

        .rank-title { font-size: 1.5rem; color: var(--primary); font-weight: bold; margin: 10px 0; display: block; }
        .funny-quote { margin-top: 15px; color: #795548; font-style: italic; font-size: 1.1rem; line-height: 1.4; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; border-radius: 25px; padding: 1.5rem; max-height: 80vh; display: flex; flex-direction: column; border: 4px solid var(--primary); }
        .preview-list { overflow-y: auto; flex-grow: 1; border: 2px solid #eee; padding: 10px; background: #fafafa; border-radius: 10px;}
        
        .toggle-box { background: white; border: 2px solid #FFCC80; border-radius: 10px; padding: 10px; display: flex; align-items: center; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="answer-overlay" class="answer-overlay hidden">
    <div class="answer-label">💡 沒關係，看清楚囉：</div>
    <div class="answer-big-text" id="overlay-en">APPLE</div>
    <div class="answer-sub" id="overlay-zh">蘋果</div>
</div>

<div class="card" id="setup-screen">
    <h1>🎈 兒童趣味拼字 🎈</h1>
    <div class="settings-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <div class="group-title" style="margin: 0;">📚 1. 選擇單字庫</div>
            <button class="btn-outline" style="width: auto; padding: 4px 10px; font-size: 0.8rem; margin: 0; border-radius:8px;" onclick="toggleModal(true)">👀 偷看字庫</button>
        </div>
        <select id="level-select" onchange="onLevelChange()"></select>
    </div>
    <div class="settings-group">
        <div class="group-title">🎯 2. 挑戰範圍與模式</div>
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 12px;">
            <div style="flex: 1; display: flex; flex-direction: column;">
                <label style="font-size: 0.8rem; font-weight:bold;">起始題號</label>
                <input type="number" id="r-start">
            </div>
            <div style="font-weight: bold; color: var(--primary); padding-top: 15px;">~</div>
            <div style="flex: 1; display: flex; flex-direction: column;">
                <label style="font-size: 0.8rem; font-weight:bold;">結束題號</label>
                <input type="number" id="r-end">
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="btn-mode-all" class="btn-mode active" onclick="setMode('all')">🏆 全部挑戰</button>
            <button id="btn-mode-random" class="btn-mode" onclick="setMode('random10')">🎲 隨機 10 題</button>
        </div>
        <input type="hidden" id="quiz-mode" value="all">
    </div>
    <div class="settings-group">
        <div class="group-title">🗣️ 3. 語音與速度</div>
        <select id="voice-select" style="margin-bottom: 10px;"></select>
        <div style="display: flex; align-items: center; gap: 15px;">
            <input type="range" id="voice-rate" min="0.5" max="2.0" step="0.1" value="1.0" style="flex:1;">
            <button class="btn-outline" style="width:auto; padding: 8px 12px;" onclick="testVoice()">🎵 測試</button>
        </div>
        <div class="toggle-box">
            <input type="checkbox" id="letter-sound-toggle" checked style="width: 20px; height: 20px; accent-color: var(--primary); cursor: pointer;">
            <label for="letter-sound-toggle" style="font-weight:bold; color:#795548; cursor:pointer; width:100%;">🔤 開啟按鍵發音 (打字機模式)</label>
        </div>
    </div>
    <button class="btn-primary" id="start-btn" disabled onclick="initGame()">🚀 開始遊戲！</button>
</div>

<div id="preview-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 style="color:var(--primary);">👀 字庫預覽</h3>
        <div class="preview-list" id="modal-list"></div>
        <button class="btn-primary" style="margin-top:10px;" onclick="toggleModal(false)">關閉</button>
    </div>
</div>

<div class="card hidden" id="game-screen">
    <div class="game-header">
        <button class="btn-secondary" style="padding: 5px 10px; font-size: 0.8rem;" onclick="location.reload()">🔙 返回</button>
        <div id="quiz-progress" style="font-weight: bold; color: #795548; font-size: 0.8rem; background: #FFE082; padding: 3px 8px; border-radius: 10px;"></div>
    </div>
    <div class="info-board">
        <div class="hearts-display" id="hearts-display">❤️❤️❤️</div>
        <div class="score-display" id="score-display">⭐ 0</div>
    </div>
    <button onclick="playVoice()" style="font-size: 4rem; background:none; border:none; cursor:pointer;">🔊</button>
    <div class="chinese-hint" id="target-zh"></div>
    <div class="spell-display" id="user-input-display"></div>
    <div class="letter-grid" id="keyboard"></div>
    <div style="display: flex; gap: 15px; margin-top: 25px;">
        <button class="btn-secondary" style="flex:1" onclick="backspace()">⬅️ 倒退</button>
        <button class="btn-secondary" style="flex:1" onclick="clearInput()">🗑️ 清除</button>
    </div>
    <div id="feedback" style="margin-top:10px; font-weight:bold; font-size:1.1rem; min-height:1.5rem;"></div>
</div>

<div class="card hidden" id="result-screen">
    <h1 id="final-stars">⭐⭐⭐</h1>
    <div id="result-body" style="line-height: 1.8; margin: 15px 0; font-size: 1.1rem; background: #f5f5f5; padding: 15px; border-radius: 15px; border: 2px dashed var(--primary);"></div>
    <div id="funny-feedback" class="funny-quote"></div>
    <button class="btn-primary" onclick="location.reload()">再玩一次 🚀</button>
</div>

<script>
    let wordData = {}, quizList = [], currentIdx = 0, currentInput = "";
    let attemptsLeft = 3, initialQuizCount = 0, totalAttemptsCount = 0;
    let score = 0;
    let synth = window.speechSynthesis, voices = [];
    let audioCtx;

    function initVoices() {
        voices = synth.getVoices().filter(v => v.lang.includes('en'));
        document.getElementById('voice-select').innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoices;

    async function autoFetchData() {
        try {
            const response = await fetch('單字庫.TXT', { cache: "no-store" });
            const text = await response.text();
            processData(text);
        } catch (err) { alert("讀取單字庫失敗，請確認檔案存在。"); }
    }

    function processData(text) {
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        lines.forEach(line => {
            if (line.includes("等級")) return;
            const parts = line.split(',');
            if (parts.length >= 3) {
                const lvl = parts[0].trim(), en = parts[1].trim(), zh = parts.slice(2).join(',').trim();
                if (!wordData[lvl]) wordData[lvl] = [];
                wordData[lvl].push({ en, zh });
            }
        });
        const lvls = Object.keys(wordData);
        if (lvls.length > 0) {
            document.getElementById('level-select').innerHTML = lvls.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('start-btn').disabled = false;
            onLevelChange();
        }
    }

    function onLevelChange() {
        const lvl = document.getElementById('level-select').value;
        document.getElementById('r-start').value = 1;
        document.getElementById('r-end').value = wordData[lvl].length;
    }

    function setMode(mode) {
        document.getElementById('quiz-mode').value = mode;
        document.getElementById('btn-mode-all').classList.toggle('active', mode === 'all');
        document.getElementById('btn-mode-random').classList.toggle('active', mode === 'random10');
    }

    function toggleModal(show) {
        if (show) {
            const lvl = document.getElementById('level-select').value;
            document.getElementById('modal-list').innerHTML = wordData[lvl].map((item, i) => 
                `<div style="padding:8px; border-bottom:1px dashed #ddd;">${i+1}. ${item.en} - ${item.zh}</div>`).join('');
            document.getElementById('preview-modal').classList.remove('hidden');
        } else document.getElementById('preview-modal').classList.add('hidden');
    }

    function initGame() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const lvl = document.getElementById('level-select').value;
        const mode = document.getElementById('quiz-mode').value;
        let start = parseInt(document.getElementById('r-start').value) - 1;
        let end = parseInt(document.getElementById('r-end').value);
        if (isNaN(start) || start < 0 || end > wordData[lvl].length) return alert("範圍設定錯誤！");

        let baseList = wordData[lvl].slice(start, end).sort(() => Math.random() - 0.5);
        quizList = (mode === "random10") ? baseList.slice(0, 10) : baseList;
        
        initialQuizCount = quizList.length; 
        currentIdx = 0; score = 0; totalAttemptsCount = 0;

        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = quizList[currentIdx];
        currentInput = ""; attemptsLeft = 3;
        updateUI();
        let letters = Array.from(new Set(q.en.replace(/\s/g, '').split('')));
        while (letters.length < 10) {
            let rand = String.fromCharCode(97 + Math.floor(Math.random() * 26));
            if (!letters.includes(rand)) letters.push(rand);
        }
        letters.sort(() => Math.random() - 0.5);
        let kbHTML = letters.map(c => `<button class="letter-btn" onclick="pressKey('${c}')">${c}</button>`).join('');
        if (q.en.includes(" ")) kbHTML += `<button class="letter-btn" style="grid-column: span 2;" onclick="pressKey(' ')">Space</button>`;
        document.getElementById('keyboard').innerHTML = kbHTML;
        setTimeout(playVoice, 500);
    }

    function updateUI() {
        document.getElementById('quiz-progress').innerText = `${currentIdx + 1}/${quizList.length}`;
        document.getElementById('target-zh').innerText = quizList[currentIdx].zh;
        document.getElementById('hearts-display').innerText = "❤️".repeat(attemptsLeft) + "🖤".repeat(3 - attemptsLeft);
        document.getElementById('score-display').innerText = `⭐ ${score}`;
        document.getElementById('user-input-display').innerText = currentInput.replace(/ /g, "_");
        document.getElementById('feedback').innerText = "";
    }

    // 【新增】唸出單一字母的函數
    function speakLetter(char) {
        synth.cancel(); // 停止先前的聲音，讓字母即時發出
        let textToSpeak = (char === ' ') ? 'space' : char;
        const utter = new SpeechSynthesisUtterance(textToSpeak);
        const vIdx = document.getElementById('voice-select').value;
        if(voices[vIdx]) utter.voice = voices[vIdx];
        utter.rate = parseFloat(document.getElementById('voice-rate').value) * 1.2; // 字母唸快一點點會比較順
        synth.speak(utter);
    }

    function pressKey(char) {
        // 【新增】檢查開關是否開啟，若開啟則發出字母音
        if (document.getElementById('letter-sound-toggle').checked) {
            speakLetter(char);
        }

        const target = quizList[currentIdx].en;
        currentInput += char;
        document.getElementById('user-input-display').innerText = currentInput.replace(/ /g, "_");
        
        if (currentInput.length === target.length) {
            totalAttemptsCount++;
            if (currentInput === target) {
                // 答對加 10 分
                score += 10;
                playSound('correct');
                document.getElementById('score-display').style.color = "var(--success)";
                setTimeout(() => document.getElementById('score-display').style.color = "#FBC02D", 500);
                
                document.getElementById('feedback').innerText = "✨ 太棒了！ (+10分) ✨";
                document.getElementById('feedback').style.color = "var(--success)";
                
                setTimeout(() => { 
                    currentIdx++; 
                    if (currentIdx >= quizList.length) showResult(); 
                    else loadQuestion(); 
                }, 1000);
            } else {
                handleIncorrect();
            }
        }
    }

    function handleIncorrect() {
        attemptsLeft--;
        
        // 答錯扣 3 分，最低 0 分
        score = Math.max(0, score - 3);
        
        playSound('incorrect');
        document.getElementById('score-display').style.color = "var(--error)";
        setTimeout(() => document.getElementById('score-display').style.color = "#FBC02D", 500);
        
        document.getElementById('game-screen').classList.add('shake-anim');
        setTimeout(() => document.getElementById('game-screen').classList.remove('shake-anim'), 300);
        
        if (attemptsLeft > 0) {
            currentInput = "";
            updateUI(); 
            document.getElementById('feedback').innerText = "❌ 差一點點 (扣3分)，再試試！";
            document.getElementById('feedback').style.color = "var(--error)";
        } else {
            updateUI(); 
            // 三次機會用完，觸發醒目答案顯示
            showAnswerOverlay(quizList[currentIdx]);
        }
    }

    function showAnswerOverlay(wordObj) {
        const overlay = document.getElementById('answer-overlay');
        document.getElementById('overlay-en').innerText = wordObj.en;
        document.getElementById('overlay-zh').innerText = wordObj.zh;
        overlay.classList.remove('hidden');

        // 自動語音導讀 The answer is...
        speakAnswerWithGuidance(wordObj.en);

        // 將錯誤單字丟到最後面重新挑戰
        quizList.push(wordObj);

        // 沉浸式停頓 2.5 秒
        setTimeout(() => {
            overlay.classList.add('hidden');
            currentIdx++;
            if (currentIdx >= quizList.length) showResult();
            else loadQuestion();
        }, 2500);
    }

    function speakAnswerWithGuidance(word) {
        synth.cancel();
        const vIdx = document.getElementById('voice-select').value;
        const rate = parseFloat(document.getElementById('voice-rate').value);
        
        const msg = new SpeechSynthesisUtterance("The answer is " + word);
        if(voices[vIdx]) msg.voice = voices[vIdx];
        msg.rate = rate;
        synth.speak(msg);
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
        } else {
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
        }
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function playVoice() {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(quizList[currentIdx].en);
        const vIdx = document.getElementById('voice-select').value;
        if(voices[vIdx]) utter.voice = voices[vIdx];
        utter.rate = parseFloat(document.getElementById('voice-rate').value);
        synth.speak(utter);
    }

    function showResult() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        
        // 正確率計算：原始題數 / 總嘗試次數
        const accuracy = Math.round((initialQuizCount / totalAttemptsCount) * 100);
        
        let stars = "";
        let rank = "";
        let quote = "";

        if (accuracy === 100) {
            stars = "⭐⭐⭐⭐⭐";
            rank = "👑 拼字傳奇：英文之神";
            quote = "哇！你被拼字之神附身了嗎？簡直是本世紀最強的英文天才！🏆";
        } else if (accuracy >= 85) {
            stars = "⭐⭐⭐⭐";
            rank = "🔥 拼字英雄：超級單字王";
            quote = "太厲害了！你的腦袋裡一定裝了一台超級電腦吧？🚀";
        } else if (accuracy >= 65) {
            stars = "⭐⭐⭐";
            rank = "🌟 拼字尖兵：智慧之星";
            quote = "表現得相當不錯喔！腦袋裡的知識果實正在長大，再接再厲！💪";
        } else if (accuracy >= 40) {
            stars = "⭐⭐";
            rank = "☘️ 拼字學徒：勇氣之星";
            quote = "嘿！你已經成功跨出了一大步。記得嗎？愛迪生發明電燈也失敗很多次喔！🍀";
        } else {
            stars = "⭐";
            rank = "🥚 拼字萌新：勇氣小雞";
            quote = "沒關係，失敗是成功的維他命！單字們在跟你玩捉迷藏，多玩幾次就能通通抓出來！🐣";
        }

        document.getElementById('final-stars').innerText = stars;
        document.getElementById('result-body').innerHTML = `
            <span class="rank-title">${rank}</span>
            🎯 挑戰單字量：${initialQuizCount} 個<br>
            🛠️ 總試錯與挑戰：${totalAttemptsCount} 次<br>
            📈 精確正確率：<span style="color:var(--primary); font-size:1.5rem;">${accuracy}%</span><br>
            🏆 最終總得分：<span style="color:#FBC02D; font-size:1.5rem; font-weight:bold;">${score}</span>
        `;
        document.getElementById('funny-feedback').innerText = quote;
    }

    function backspace() { currentInput = currentInput.slice(0, -1); updateUI(); }
    function clearInput() { currentInput = ""; updateUI(); }
    function testVoice() { speakAnswerWithGuidance("Success"); }

    window.onload = autoFetchData;
</script>
</body>
</html>
