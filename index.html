<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字母拼圖挑戰</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --error: #d93025; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 2.2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .hidden { display: none !important; }
        h1 { color: var(--primary); margin-bottom: 1.5rem; }
        
        .status-banner { padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 0.95rem; font-weight: bold; }
        .status-loading { background: #fff3cd; color: #856404; }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }

        .settings-group { background: #f1f3f4; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #e0e0e0; text-align: left; }
        .group-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; color: #3c4043; }
        select, input[type="number"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #dadce0; font-size: 1rem; margin-top: 5px; box-sizing: border-box; }
        
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; margin-top: 10px; }
        .btn-primary:disabled { background: #e8eaed; color: #9aa0a6; cursor: not-allowed; }
        .btn-secondary { background: white; border: 2px solid #dadce0; color: #3c4043; margin-top: 10px; }

        .chinese-hint { font-size: 2rem; font-weight: bold; margin: 20px 0; color: #202124; min-height: 2.5rem; }
        .spell-display { font-size: 2.5rem; letter-spacing: 5px; color: var(--primary); border-bottom: 3px solid var(--primary); display: inline-block; min-width: 150px; min-height: 3.5rem; margin-bottom: 20px; font-weight: bold; }
        .letter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .letter-btn { background: white; border: 2px solid #dadce0; padding: 15px 5px; border-radius: 10px; font-size: 1.3rem; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #dadce0; }
        .letter-btn:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

<div class="card" id="setup-screen">
    <h1>單字拼圖挑戰</h1>
    
    <div id="load-status" class="status-banner status-loading">正在載入單字庫...</div>

    <div class="settings-group">
        <div class="group-title">1. 選擇等級</div>
        <select id="level-select" onchange="updateRangeHint()"></select>
    </div>

    <div class="settings-group">
        <div class="group-title">2. 測驗範圍</div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="number" id="r-start" value="1" min="1">
            <span>至</span>
            <input type="number" id="r-end" value="10">
        </div>
        <div id="range-info" style="font-size: 0.75rem; color: #70757a; margin-top: 8px;"></div>
    </div>

    <button class="btn-primary" id="start-btn" disabled onclick="initGame()">開始挑戰</button>
</div>

<div class="card hidden" id="game-screen">
    <div id="quiz-progress" style="text-align: right; color: #70757a; font-size: 0.85rem;"></div>
    <button onclick="playVoice()" style="font-size: 3rem; background:none; border:none; cursor:pointer;">🔊</button>
    <div class="chinese-hint" id="target-zh"></div>
    <div class="spell-display" id="user-input-display"></div>
    
    <div class="letter-grid" id="keyboard"></div>
    
    <div style="display: flex; gap: 10px; margin-top: 25px;">
        <button class="btn-secondary" onclick="backspace()">退格</button>
        <button class="btn-secondary" onclick="clearInput()">清除</button>
    </div>
    <div id="feedback" style="margin-top: 15px; font-weight: bold; height: 1.5rem;"></div>
</div>

<div class="card hidden" id="result-screen">
    <h2>測驗完成！</h2>
    <div id="result-body" style="line-height: 2; margin: 20px 0; font-size: 1.1rem;"></div>
    <button class="btn-primary" onclick="location.reload()">回首頁</button>
</div>

<script>
    let wordData = {}; 
    let quizList = [];
    let currentIdx = 0;
    let currentInput = "";
    let errorCount = 0;
    let totalAttempts = 0;

    // --- 自動載入與純淨解析邏輯 ---
    async function autoFetchData() {
        const statusEl = document.getElementById('load-status');
        try {
            const response = await fetch('單字庫.TXT', { cache: "no-store" });
            if (!response.ok) throw new Error('連線失敗');
            const text = await response.text();
            processData(text);
            
            statusEl.className = "status-banner status-success";
            statusEl.innerText = "✅ 單字庫載入成功！";
        } catch (err) {
            statusEl.className = "status-banner status-error";
            statusEl.innerHTML = "⚠️ 載入失敗<br><small>請確認檔案已上傳至伺服器</small>";
        }
    }

    function processData(text) {
        wordData = {};
        // 純淨切割：只依換行符號切割，過濾完全空白的行
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        
        lines.forEach(line => {
            // 跳過標題列
            if (line.includes("等級") && line.includes("英文單字")) return;
            
            // 直接以逗號切割，不進行額外的正則表達式清理
            const parts = line.split(',');
            if (parts.length >= 3) {
                const lvl = parts[0].trim();
                const en = parts[1].trim();
                const zh = parts.slice(2).join(',').trim();
                
                if (lvl && en) {
                    if (!wordData[lvl]) wordData[lvl] = [];
                    wordData[lvl].push({ en, zh });
                }
            }
        });

        const lvls = Object.keys(wordData);
        if (lvls.length > 0) {
            const select = document.getElementById('level-select');
            select.innerHTML = lvls.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('start-btn').disabled = false;
            updateRangeHint();
        }
    }

    function updateRangeHint() {
        const lvl = document.getElementById('level-select').value;
        if (!wordData[lvl]) return;
        const count = wordData[lvl].length;
        document.getElementById('r-start').value = 1;
        document.getElementById('r-end').value = count;
        document.getElementById('range-info').innerText = `* 此等級共有 ${count} 個單字`;
    }

    // --- 遊戲邏輯 ---
    function initGame() {
        const lvl = document.getElementById('level-select').value;
        const start = parseInt(document.getElementById('r-start').value) - 1;
        const end = parseInt(document.getElementById('r-end').value);
        
        quizList = wordData[lvl].slice(start, end).sort(() => Math.random() - 0.5);
        if (quizList.length === 0) return alert("範圍設定錯誤");

        currentIdx = 0;
        totalAttempts = 0;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = quizList[currentIdx];
        currentInput = "";
        errorCount = 0;
        document.getElementById('quiz-progress').innerText = `進度：${currentIdx + 1} / ${quizList.length}`;
        document.getElementById('target-zh').innerText = q.zh;
        document.getElementById('user-input-display').innerText = "";
        document.getElementById('feedback').innerText = "";
        
        // 保留原字串長度與空白邏輯：
        // 為了讓包含空白的字(如 good morning)能順利拼寫，這裡過濾非字母字元作為「目標答案」
        const answerLettersOnly = q.en.toLowerCase().replace(/[^a-z]/g, '');
        let letters = answerLettersOnly.split('');
        
        const alpha = "abcdefghijklmnopqrstuvwxyz";
        while(letters.length < answerLettersOnly.length + 4) {
            letters.push(alpha[Math.floor(Math.random()*26)]);
        }
        letters.sort(() => Math.random() - 0.5);

        const kb = document.getElementById('keyboard');
        kb.innerHTML = letters.map(char => `<button class="letter-btn" onclick="pressKey('${char}')">${char}</button>`).join('');
        playVoice();
    }

    function pressKey(char) {
        const q = quizList[currentIdx];
        // 驗證時同樣忽略空白與符號
        const targetLettersOnly = q.en.toLowerCase().replace(/[^a-z]/g, '');
        
        currentInput += char;
        document.getElementById('user-input-display').innerText = currentInput.toUpperCase();

        if (currentInput.length === targetLettersOnly.length) {
            totalAttempts++;
            if (currentInput === targetLettersOnly) {
                document.getElementById('feedback').innerText = "🌟 正確！";
                document.getElementById('feedback').style.color = "var(--success)";
                setTimeout(nextQuestion, 800);
            } else {
                errorCount++;
                if (errorCount >= 3) {
                    document.getElementById('feedback').innerText = `正解是: ${q.en.toUpperCase()}`;
                    document.getElementById('feedback').style.color = "var(--error)";
                    quizList.push(quizList.splice(currentIdx, 1)[0]);
                    setTimeout(loadQuestion, 2000);
                } else {
                    document.getElementById('feedback').innerText = "❌ 再試一次";
                    document.getElementById('feedback').style.color = "var(--error)";
                    currentInput = "";
                    document.getElementById('user-input-display').innerText = "";
                }
            }
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx >= quizList.length) {
            showResult();
        } else {
            loadQuestion();
        }
    }

    function backspace() { currentInput = currentInput.slice(0, -1); document.getElementById('user-input-display').innerText = currentInput.toUpperCase(); }
    function clearInput() { currentInput = ""; document.getElementById('user-input-display').innerText = ""; }

    function playVoice() {
        if(!quizList[currentIdx]) return;
        const msg = new SpeechSynthesisUtterance(quizList[currentIdx].en);
        msg.lang = 'en-US';
        speechSynthesis.speak(msg);
    }

    function showResult() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const accuracy = Math.round((quizList.length / totalAttempts) * 100);
        document.getElementById('result-body').innerHTML = `
            等級：${document.getElementById('level-select').value}<br>
            完成題數：${quizList.length} 題<br>
            總嘗試次數：${totalAttempts} 次<br>
            <strong>熟練度：${accuracy}%</strong>
        `;
    }

    // 初始化
    window.onload = autoFetchData;

    // 鍵盤支援
    window.addEventListener('keydown', (e) => {
        if (document.getElementById('game-screen').classList.contains('hidden')) return;
        if (e.key === 'Backspace') backspace();
        if (e.key.length === 1 && /[a-z]/i.test(e.key)) pressKey(e.key.toLowerCase());
    });
</script>

</body>
</html>
