<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字母拼圖挑戰</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --error: #d93025; --bg: #f8f9fa; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        .card { background: white; padding: 1.2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 480px; text-align: center; position: relative; }
        .hidden { display: none !important; }
        h1 { color: var(--primary); margin: 0 0 1rem 0; font-size: 1.5rem; }
        
        /* 設定區域樣式 */
        .settings-group { background: #f1f3f4; padding: 12px; border-radius: 12px; border: 1px solid #e0e0e0; text-align: left; margin-bottom: 12px; }
        .group-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: #3c4043; }
        select, input[type="number"], input[type="range"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #dadce0; font-size: 1rem; margin-bottom: 5px; }
        
        /* 模式選擇按鈕樣式 */
        .btn-mode { flex: 1; background: white; border: 2px solid #dadce0; color: #3c4043; padding: 10px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-mode.active { border-color: var(--primary); background: #e8f0fe; color: var(--primary); }

        /* 遊戲頂部工具欄 (三欄佈局) */
        .game-header { display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; width: 100%; margin-bottom: 15px; }

        /* 等寬字型區：確保 I 與 l 可分辨 */
        .monospace-font { font-family: 'Consolas', 'Monaco', 'Courier New', monospace !important; font-weight: bold; }

        .chinese-hint { font-size: 1.8rem; font-weight: bold; margin: 10px 0; color: #202124; }
        .spell-display { font-size: 2.2rem; letter-spacing: 2px; color: var(--primary); border-bottom: 3px solid var(--primary); display: inline-block; min-width: 180px; min-height: 2.8rem; margin-bottom: 15px; white-space: pre; }
        
        .letter-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .letter-btn { background: white; border: 2px solid #dadce0; padding: 12px 2px; border-radius: 12px; font-size: 1.5rem; box-shadow: 0 4px 0 #dadce0; }
        .letter-btn:active { transform: translateY(2px); box-shadow: none; }
        .space-btn { grid-column: span 2; font-size: 1rem; background: #e8f0fe; }
        
        button { cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; font-size: 1rem; margin-top: 5px; }
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); width: 100%; padding: 10px; border-radius: 10px; font-weight: bold; }
        .btn-secondary { background: white; border: 2px solid #dadce0; color: #3c4043; padding: 8px 12px; border-radius: 10px; font-size: 0.9rem; font-weight: bold; }
        .btn-danger { background: #fce8e6; color: #d93025; font-size: 0.85rem; margin-top: 10px; padding: 8px; border: none; width: 100%; border-radius: 12px; }
        .btn-toggle { font-size: 0.8rem; padding: 5px 10px; border: 1px solid var(--primary); color: var(--primary); background: #e8f0fe; border-radius: 8px; font-weight: bold; white-space: nowrap; }
        .btn-toggle.off { border-color: #666; color: #666; background: #eee; }

        #feedback { margin-top: 10px; font-weight: bold; min-height: 1.2rem; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 20px; padding: 1.5rem; max-height: 80vh; display: flex; flex-direction: column; }
        .preview-list { overflow-y: auto; flex-grow: 1; border: 1px solid #eee; border-radius: 8px; padding: 5px 15px; }
        .preview-item { font-size: 0.95rem; border-bottom: 1px solid #f0f0f0; padding: 8px 0; text-align: left; }
    </style>
</head>
<body>

<div class="card" id="setup-screen">
    <h1>字母拼圖挑戰</h1>
    
    <div class="settings-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <div class="group-title" style="margin: 0;">1. 單字庫設定</div>
            <button class="btn-outline" style="width: auto; padding: 4px 10px; font-size: 0.8rem; margin: 0;" onclick="toggleModal(true)">🔍 預覽</button>
        </div>
        <select id="level-select" onchange="onLevelChange()" style="margin: 0;"></select>
    </div>

    <div class="settings-group">
        <div class="group-title">2. 測驗範圍與模式</div>
        <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 10px;">
            <input type="number" id="r-start" style="width: 80px; margin: 0;">
            <span>~</span>
            <input type="number" id="r-end" style="width: 80px; margin: 0;">
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="btn-mode-all" class="btn-mode active" onclick="setMode('all')">全部測試</button>
            <button id="btn-mode-random" class="btn-mode" onclick="setMode('random10')">隨機 10 題</button>
        </div>
        <input type="hidden" id="quiz-mode" value="all">
    </div>

    <div class="settings-group">
        <div class="group-title">3. 語音測試與設定</div>
        <select id="voice-select" style="margin-bottom: 10px;"></select>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="flex: 1;">
                <input type="range" id="voice-rate" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('rate-val').innerText=parseFloat(this.value).toFixed(1)" style="margin: 0;">
                <div style="font-size:0.8rem; margin-top: 2px;">語速: <span id="rate-val" style="color:var(--primary); font-weight: bold;">1.0</span></div>
            </div>
            <button class="btn-outline" style="margin: 0; width: auto; padding: 10px 15px;" onclick="testVoice()">🎵 測試</button>
        </div>
    </div>

    <button class="btn-primary" id="start-btn" disabled onclick="initGame()">開始挑戰</button>
    <button class="btn-danger" onclick="exitProgram()">結束程式</button>
</div>

<div id="preview-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 style="margin:0 0 10px 0;">字庫預覽</h3>
        <div class="preview-list" id="modal-list"></div>
        <button class="btn-primary" onclick="toggleModal(false)">關閉</button>
    </div>
</div>

<div class="card hidden" id="game-screen">
    <div class="game-header">
        <div style="text-align: left;">
            <button class="btn-secondary" onclick="returnToMain()">返回</button>
        </div>
        <div style="text-align: center;">
            <button id="letter-sound-toggle" class="btn-toggle" onclick="toggleLetterSound()">字母發音: 開</button>
        </div>
        <div style="text-align: right;">
            <div id="quiz-progress" style="font-weight: bold; color: #555; font-size: 0.85rem;"></div>
        </div>
    </div>

    <button onclick="playVoice()" style="font-size: 3.5rem; background:none; border:none; cursor:pointer; margin:5px 0;">🔊</button>
    <div class="chinese-hint" id="target-zh"></div>
    <div id="attempt-info" style="font-size: 0.8rem; color: #666;">剩餘機會: 3</div>
    
    <div class="spell-display monospace-font" id="user-input-display"></div>
    <div class="letter-grid monospace-font" id="keyboard"></div>
    
    <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="btn-secondary" style="flex:1" onclick="backspace()">退格</button>
        <button class="btn-secondary" style="flex:1" onclick="clearInput()">清除</button>
    </div>
    <div id="feedback"></div>
</div>

<div class="card hidden" id="result-screen">
    <h2>測驗完成！</h2>
    <div id="result-body" style="line-height: 2; margin: 20px 0; font-size: 1.1rem;"></div>
    <button class="btn-primary" onclick="location.reload()">回首頁</button>
</div>

<script>
    let wordData = {}, quizList = [], currentIdx = 0, currentInput = "";
    let attemptsLeft = 3, totalAttempts = 0, correctAnswers = 0, initialQuizCount = 0;
    let synth = window.speechSynthesis, voices = [];
    let audioCtx; 
    let isLetterSoundEnabled = true;

    function initVoices() {
        voices = synth.getVoices().filter(v => v.lang.includes('en'));
        document.getElementById('voice-select').innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoices;

    // 處理測驗模式按鈕切換
    function setMode(mode) {
        document.getElementById('quiz-mode').value = mode;
        document.getElementById('btn-mode-all').classList.toggle('active', mode === 'all');
        document.getElementById('btn-mode-random').classList.toggle('active', mode === 'random10');
    }

    function testVoice() {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance("The voice is clear. Good luck!");
        const vIdx = document.getElementById('voice-select').value;
        if(voices[vIdx]) utter.voice = voices[vIdx];
        utter.rate = parseFloat(document.getElementById('voice-rate').value);
        synth.speak(utter);
    }

    function toggleLetterSound() {
        isLetterSoundEnabled = !isLetterSoundEnabled;
        const btn = document.getElementById('letter-sound-toggle');
        btn.innerText = `字母發音: ${isLetterSoundEnabled ? '開' : '關'}`;
        btn.classList.toggle('off', !isLetterSoundEnabled);
    }

    function playSound(type) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        if (type === 'correct') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(523.25, now);
            osc.frequency.exponentialRampToValueAtTime(659.25, now + 0.1);
            gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.3, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'incorrect') {
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.2);
            gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            osc.start(now); osc.stop(now + 0.2);
        }
    }

    function speakLetter(char) {
        if (!isLetterSoundEnabled) return;
        synth.cancel(); 
        const utter = new SpeechSynthesisUtterance(char === ' ' ? 'space' : char);
        const vIdx = document.getElementById('voice-select').value;
        if(voices[vIdx]) utter.voice = voices[vIdx];
        utter.rate = 1.3;
        synth.speak(utter);
    }

    async function autoFetchData() {
        try {
            const response = await fetch('單字庫.TXT', { cache: "no-store" });
            const text = await response.text();
            processData(text);
            initVoices();
        } catch (err) { alert("讀取單字庫失敗。"); }
    }

    function processData(text) {
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        lines.forEach(line => {
            if (line.includes("等級")) return;
            const parts = line.split(',');
            if (parts.length >= 3) {
                const lvl = parts[0].trim(), en = parts[1].trim(), zh = parts.slice(2).join(',').trim();
                if (!wordData[lvl]) wordData[lvl] = [];
                wordData[lvl].push({ en, zh });
            }
        });
        const lvls = Object.keys(wordData);
        if (lvls.length > 0) {
            document.getElementById('level-select').innerHTML = lvls.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('start-btn').disabled = false;
            onLevelChange();
        }
    }

    function onLevelChange() {
        const lvl = document.getElementById('level-select').value;
        document.getElementById('r-start').value = 1;
        document.getElementById('r-end').value = wordData[lvl].length;
    }

    function toggleModal(show) {
        const modal = document.getElementById('preview-modal');
        if (show) {
            const lvl = document.getElementById('level-select').value;
            document.getElementById('modal-list').innerHTML = wordData[lvl].map((item, i) => 
                `<div class="preview-item"><strong>${i+1}.</strong> ${item.en} - ${item.zh}</div>`).join('');
            modal.classList.remove('hidden');
        } else modal.classList.add('hidden');
    }

    function initGame() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const lvl = document.getElementById('level-select').value;
        const mode = document.getElementById('quiz-mode').value;
        let start = parseInt(document.getElementById('r-start').value) - 1;
        let end = parseInt(document.getElementById('r-end').value);
        if (isNaN(start) || isNaN(end) || start < 0 || end > wordData[lvl].length || start >= end) return alert("範圍錯誤");

        let baseList = wordData[lvl].slice(start, end).sort(() => Math.random() - 0.5);
        quizList = (mode === "random10") ? baseList.slice(0, 10) : baseList;
        initialQuizCount = quizList.length; currentIdx = 0; totalAttempts = 0; correctAnswers = 0;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = quizList[currentIdx];
        currentInput = ""; attemptsLeft = 3;
        updateUI();
        
        // 抓取單字中的所有字元（保留原始大小寫與符號）
        let rawChars = q.en.replace(/\s/g, '').split('');
        let letters = Array.from(new Set(rawChars));
        
        // 生成干擾字：優先選用小寫字母
        let lowerUsedSet = new Set(letters.map(c => c.toLowerCase()));
        const lowerAlpha = "abcdefghijklmnopqrstuvwxyz";
        let shuffledLower = lowerAlpha.split('').sort(() => Math.random() - 0.5);
        
        for (let char of shuffledLower) {
            if (letters.length >= 10) break;
            if (!lowerUsedSet.has(char)) {
                letters.push(char);
                lowerUsedSet.add(char);
            }
        }
        
        letters.sort(() => Math.random() - 0.5);

        let kbHTML = letters.map(c => `<button class="letter-btn" onclick="pressKey('${c}')">${c}</button>`).join('');
        if (q.en.includes(" ")) kbHTML += `<button class="letter-btn space-btn" onclick="pressKey(' ')">Space</button>`;
        document.getElementById('keyboard').innerHTML = kbHTML;
        setTimeout(() => playVoice(), 300);
    }

    function updateUI() {
        document.getElementById('quiz-progress').innerText = `${currentIdx + 1}/${quizList.length}`;
        document.getElementById('target-zh').innerText = quizList[currentIdx].zh;
        document.getElementById('attempt-info').innerText = `剩餘機會: ${attemptsLeft}`;
        document.getElementById('user-input-display').innerText = currentInput.replace(/ /g, "_");
        document.getElementById('feedback').innerText = "";
    }

    function pressKey(char) {
        speakLetter(char);
        const target = quizList[currentIdx].en;
        currentInput += char;
        document.getElementById('user-input-display').innerText = currentInput.replace(/ /g, "_");

        if (currentInput.length === target.length) {
            totalAttempts++;
            if (currentInput === target) {
                if (attemptsLeft === 3) correctAnswers++;
                playSound('correct'); 
                document.getElementById('feedback').innerText = "🌟 Correct!";
                document.getElementById('feedback').style.color = "var(--success)";
                setTimeout(() => { currentIdx++; if (currentIdx >= quizList.length) showResult(); else loadQuestion(); }, 1000);
            } else {
                handleIncorrect();
            }
        }
    }

    function handleIncorrect() {
        attemptsLeft--;
        playSound('incorrect'); 
        currentInput = ""; 
        
        if (attemptsLeft > 0) {
            document.getElementById('feedback').innerText = `❌ Incorrect! 剩下 ${attemptsLeft} 次`;
            document.getElementById('feedback').style.color = "var(--error)";
            document.getElementById('attempt-info').innerText = `剩餘機會: ${attemptsLeft}`;
            setTimeout(() => { document.getElementById('user-input-display').innerText = ""; }, 500);
        } else {
            const targetWord = quizList[currentIdx].en;
            document.getElementById('feedback').innerText = `💡 Answer: ${targetWord}`;
            document.getElementById('feedback').style.color = "var(--primary)";
            document.getElementById('user-input-display').innerText = targetWord;
            
            quizList.push(quizList[currentIdx]); 
            speakAnswerOnly(targetWord);
        }
    }

    function speakAnswerOnly(word) {
        synth.cancel();
        const vIdx = document.getElementById('voice-select').value;
        const mainRate = parseFloat(document.getElementById('voice-rate').value);
        const wordUtter = new SpeechSynthesisUtterance(word);
        if(voices[vIdx]) wordUtter.voice = voices[vIdx];
        wordUtter.rate = mainRate;
        wordUtter.onend = () => {
            setTimeout(() => {
                currentIdx++;
                if (currentIdx >= quizList.length) showResult();
                else loadQuestion();
            }, 1500);
        };
        synth.speak(wordUtter);
    }

    function backspace() { currentInput = currentInput.slice(0, -1); updateUI(); }
    function clearInput() { currentInput = ""; updateUI(); }
    function exitProgram() { if(confirm("確定結束？")) location.href="about:blank"; }
    function returnToMain() { if(confirm("返回主畫面？")) location.reload(); }

    function playVoice() {
        synth.cancel(); 
        const utter = new SpeechSynthesisUtterance(quizList[currentIdx].en);
        const vIdx = document.getElementById('voice-select').value;
        if(voices[vIdx]) utter.voice = voices[vIdx];
        utter.rate = parseFloat(document.getElementById('voice-rate').value);
        synth.speak(utter);
    }

    function showResult() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const accuracy = Math.round((correctAnswers / initialQuizCount) * 100);
        document.getElementById('result-body').innerHTML = `
            測驗題數：${initialQuizCount} 題<br>
            一次答對：${correctAnswers} 題<br>
            總準確率：${accuracy}%<br>
            總嘗試次數：${totalAttempts} 次
        `;
    }

    window.onload = autoFetchData;
</script>
</body>
</html>
