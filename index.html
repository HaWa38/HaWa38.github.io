<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字母拼圖挑戰</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --error: #d93025; --bg: #f8f9fa; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        .card { background: white; padding: 1.2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 480px; text-align: center; position: relative; }
        .hidden { display: none !important; }
        h1 { color: var(--primary); margin: 0 0 1rem 0; font-size: 1.5rem; }
        
        .settings-group { background: #f1f3f4; padding: 10px; border-radius: 12px; border: 1px solid #e0e0e0; text-align: left; margin-bottom: 10px; }
        .group-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #3c4043; }
        select, input[type="number"], input[type="range"] { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #dadce0; font-size: 1rem; margin-bottom: 5px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 20px; padding: 1.5rem; max-height: 80vh; display: flex; flex-direction: column; }
        .preview-list { overflow-y: auto; flex-grow: 1; border: 1px solid #eee; border-radius: 8px; padding: 5px 15px; }
        .preview-item { font-size: 0.95rem; border-bottom: 1px solid #f0f0f0; padding: 8px 0; text-align: left; }

        button { width: 100%; padding: 12px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; margin-top: 5px; }
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); margin-bottom: 5px; }
        .btn-secondary { background: white; border: 2px solid #dadce0; color: #3c4043; }
        .btn-danger { background: #fce8e6; color: #d93025; font-size: 0.85rem; margin-top: 10px; padding: 8px; }

        /* 遊戲畫面樣式 */
        .chinese-hint { font-size: 1.8rem; font-weight: bold; margin: 10px 0; color: #202124; }
        .spell-display { font-size: 2.2rem; letter-spacing: 2px; color: var(--primary); border-bottom: 3px solid var(--primary); display: inline-block; min-width: 180px; min-height: 2.8rem; margin-bottom: 15px; font-weight: bold; white-space: pre; }
        
        .letter-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .letter-btn { background: white; border: 2px solid #dadce0; padding: 12px 2px; border-radius: 12px; font-size: 1.4rem; font-weight: bold; box-shadow: 0 4px 0 #dadce0; }
        .letter-btn:active { transform: translateY(2px); box-shadow: none; }
        .space-btn { grid-column: span 2; background: #e8f0fe; font-size: 1rem; }
        #feedback { margin-top: 10px; font-weight: bold; min-height: 1.2rem; }
    </style>
</head>
<body>

<div class="card" id="setup-screen">
    <h1>字母拼圖挑戰</h1>
    <div class="settings-group">
        <div class="group-title">1. 單字庫設定</div>
        <select id="level-select" onchange="onLevelChange()"></select>
        <button class="btn-outline" onclick="toggleModal(true)">🔍 查看字庫預覽</button>
    </div>
    <div class="settings-group">
        <div class="group-title">2. 測驗範圍與模式</div>
        <div style="display: flex; gap: 8px;">
            <input type="number" id="r-start"><span>~</span><input type="number" id="r-end">
        </div>
        <select id="quiz-mode">
            <option value="all">範圍全測 (錯題循環)</option>
            <option value="random10">隨機 10 題 (錯題循環)</option>
        </select>
    </div>
    <div class="settings-group">
        <div class="group-title">3. 語音與語速</div>
        <select id="voice-select"></select>
        <input type="range" id="voice-rate" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('rate-val').innerText=parseFloat(this.value).toFixed(1)">
        <div style="text-align:right; font-size:0.8rem;">語速: <span id="rate-val" style="color:var(--primary)">1.0</span></div>
    </div>
    <button class="btn-primary" id="start-btn" disabled onclick="initGame()">開始挑戰</button>
    <button class="btn-danger" onclick="exitProgram()">結束程式</button>
</div>

<div id="preview-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 id="modal-title" style="margin:0 0 10px 0;">字庫預覽</h3>
        <div class="preview-list" id="modal-list"></div>
        <button class="btn-primary" onclick="toggleModal(false)">關閉</button>
    </div>
</div>

<div class="card hidden" id="game-screen">
    <div style="display: flex; justify-content: space-between;">
        <button class="btn-secondary" style="width:auto; padding:5px 10px;" onclick="returnToMain()">← 返回</button>
        <div id="quiz-progress" style="font-weight: bold; color: #555;"></div>
    </div>
    <button onclick="playVoice()" style="font-size: 3rem; background:none; border:none; cursor:pointer; margin:10px 0;">🔊</button>
    <div class="chinese-hint" id="target-zh"></div>
    <div id="attempt-info" style="font-size: 0.8rem; color: #666;">剩餘機會: 3</div>
    <div class="spell-display" id="user-input-display"></div>
    <div class="letter-grid" id="keyboard"></div>
    <div style="display: flex; gap: 10px; margin-top: 15px;">
        <button class="btn-secondary" onclick="backspace()">退格</button>
        <button class="btn-secondary" onclick="clearInput()">清除</button>
    </div>
    <div id="feedback"></div>
</div>

<div class="card hidden" id="result-screen">
    <h2>測驗完成！</h2>
    <div id="result-body" style="line-height: 2; margin: 20px 0; font-size: 1.1rem;"></div>
    <button class="btn-primary" onclick="location.reload()">回首頁</button>
</div>

<script>
    let wordData = {}, quizList = [], currentIdx = 0, currentInput = "";
    let attemptsLeft = 3, totalAttempts = 0, correctAnswers = 0, initialQuizCount = 0;
    
    // 語音與音效變數
    let synth = window.speechSynthesis, voices = [];
    let audioCtx; 

    // 初始化語音引擎
    function initVoices() {
        voices = synth.getVoices().filter(v => v.lang.includes('en'));
        document.getElementById('voice-select').innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoices;

    // Web Audio API 產生音效 (無須外部檔案)
    function playSound(type) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;
        
        if (type === 'correct') {
            // 清脆過關音效 (C5 -> E5 滑音)
            oscillator.type = 'triangle';
            oscillator.frequency.setValueAtTime(523.25, now);
            oscillator.frequency.exponentialRampToValueAtTime(659.25, now + 0.1);
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.3, now + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            oscillator.start(now);
            oscillator.stop(now + 0.3);
        } else if (type === 'incorrect') {
            // 低沉錯誤音效
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(150, now);
            oscillator.frequency.linearRampToValueAtTime(100, now + 0.2);
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(0.2, now + 0.05);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
            oscillator.start(now);
            oscillator.stop(now + 0.2);
        }
    }

    // 朗讀單一字母
    function speakLetter(char) {
        synth.cancel(); // 切斷前一個語音，讓快速打字時不會卡住
        const textToSpeak = (char === ' ') ? 'space' : char;
        const utter = new SpeechSynthesisUtterance(textToSpeak);
        const vIdx = document.getElementById('voice-select').value;
        if(voices[vIdx]) utter.voice = voices[vIdx];
        utter.rate = 1.2; // 唸字母稍微快一點比較俐落
        synth.speak(utter);
    }

    async function autoFetchData() {
        try {
            const response = await fetch('單字庫.TXT', { cache: "no-store" });
            const text = await response.text();
            processData(text);
            initVoices();
        } catch (err) { alert("讀取單字庫失敗。"); }
    }

    function processData(text) {
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        lines.forEach(line => {
            if (line.includes("等級")) return;
            const parts = line.split(',');
            if (parts.length >= 3) {
                const lvl = parts[0].trim(), en = parts[1].trim(), zh = parts.slice(2).join(',').trim();
                if (!wordData[lvl]) wordData[lvl] = [];
                wordData[lvl].push({ en, zh });
            }
        });
        const lvls = Object.keys(wordData);
        if (lvls.length > 0) {
            document.getElementById('level-select').innerHTML = lvls.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('start-btn').disabled = false;
            onLevelChange();
        }
    }

    function onLevelChange() {
        const lvl = document.getElementById('level-select').value;
        document.getElementById('r-start').value = 1;
        document.getElementById('r-end').value = wordData[lvl].length;
    }

    function toggleModal(show) {
        const modal = document.getElementById('preview-modal');
        if (show) {
            const lvl = document.getElementById('level-select').value;
            document.getElementById('modal-list').innerHTML = wordData[lvl].map((item, i) => 
                `<div class="preview-item"><strong>${i+1}.</strong> ${item.en} - ${item.zh}</div>`).join('');
            modal.classList.remove('hidden');
        } else modal.classList.add('hidden');
    }

    function initGame() {
        // 啟動音效引擎 (必須在使用者點擊按鈕時初始化才能獲得瀏覽器權限)
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const lvl = document.getElementById('level-select').value;
        const mode = document.getElementById('quiz-mode').value;
        let start = parseInt(document.getElementById('r-start').value) - 1;
        let end = parseInt(document.getElementById('r-end').value);
        if (isNaN(start) || isNaN(end) || start < 0 || end > wordData[lvl].length || start >= end) return alert("範圍錯誤");

        let baseList = wordData[lvl].slice(start, end).sort(() => Math.random() - 0.5);
        quizList = (mode === "random10") ? baseList.slice(0, 10) : baseList;
        
        initialQuizCount = quizList.length;
        currentIdx = 0; totalAttempts = 0; correctAnswers = 0;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = quizList[currentIdx];
        currentInput = ""; attemptsLeft = 3;
        updateUI();
        
        const rawWord = q.en; 
        let letterSet = new Set(rawWord.replace(/[^a-zA-Z]/g, '').split('')); 
        let letters = Array.from(letterSet);
        
        const alpha = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
        while(letters.length < 10) {
            let rand = alpha[Math.floor(Math.random()*alpha.length)];
            if(!letterSet.has(rand)) { letters.push(rand); letterSet.add(rand); }
        }
        letters.sort(() => Math.random() - 0.5);

        let kbHTML = letters.map(c => `<button class="letter-btn" onclick="pressKey('${c}')">${c}</button>`).join('');
        if (rawWord.includes(" ")) kbHTML += `<button class="letter-btn space-btn" onclick="pressKey(' ')">Space</button>`;
        document.getElementById('keyboard').innerHTML = kbHTML;
        
        // 進入新題目時先朗讀一次整個單字
        setTimeout(() => playVoice(), 300);
    }

    function updateUI() {
        document.getElementById('quiz-progress').innerText = `進度: ${currentIdx + 1} / ${quizList.length}`;
        document.getElementById('target-zh').innerText = quizList[currentIdx].zh;
        document.getElementById('attempt-info').innerText = `剩餘機會: ${attemptsLeft}`;
        document.getElementById('user-input-display').innerText = currentInput.replace(/ /g, "_");
        document.getElementById('feedback').innerText = "";
    }

    function pressKey(char) {
        // 發出按下的字母語音
        speakLetter(char);

        const target = quizList[currentIdx].en;
        currentInput += char;
        document.getElementById('user-input-display').innerText = currentInput.replace(/ /g, "_");

        if (currentInput.length === target.length) {
            totalAttempts++;
            if (currentInput === target) {
                if (attemptsLeft === 3) correctAnswers++;
                playSound('correct'); // 播放過關音效
                document.getElementById('feedback').innerText = "🌟 Correct!";
                document.getElementById('feedback').style.color = "var(--success)";
                setTimeout(() => { currentIdx++; if (currentIdx >= quizList.length) showResult(); else loadQuestion(); }, 1000);
            } else {
                handleIncorrect();
            }
        }
    }

    function handleIncorrect() {
        attemptsLeft--;
        playSound('incorrect'); // 播放錯誤音效
        
        if (attemptsLeft > 0) {
            document.getElementById('feedback').innerText = `❌ Incorrect! 剩下 ${attemptsLeft} 次`;
            document.getElementById('feedback').style.color = "var(--error)";
            document.getElementById('attempt-info').innerText = `剩餘機會: ${attemptsLeft}`;
            currentInput = "";
        } else {
            document.getElementById('feedback').innerText = `💡 答案是: ${quizList[currentIdx].en}`;
            document.getElementById('feedback').style.color = "var(--primary)";
            quizList.push(quizList[currentIdx]); // 錯三次移到最後面
            
            // 稍等一下再唸出正確單字，避免跟字母發音衝到
            setTimeout(() => playVoice(), 500); 
            setTimeout(() => { currentIdx++; loadQuestion(); }, 2500);
        }
    }

    function backspace() { currentInput = currentInput.slice(0, -1); updateUI(); }
    function clearInput() { currentInput = ""; updateUI(); }
    function exitProgram() { if(confirm("確定結束？")) location.href="about:blank"; }
    function returnToMain() { if(confirm("返回主畫面？")) location.reload(); }

    function playVoice() {
        synth.cancel(); // 確保不會有排隊的聲音
        const utter = new SpeechSynthesisUtterance(quizList[currentIdx].en);
        const vIdx = document.getElementById('voice-select').value;
        if(voices[vIdx]) utter.voice = voices[vIdx];
        utter.rate = parseFloat(document.getElementById('voice-rate').value);
        synth.speak(utter);
    }

    function showResult() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const accuracy = Math.round((correctAnswers / initialQuizCount) * 100);
        document.getElementById('result-body').innerHTML = `
            測驗題數：${initialQuizCount} 題<br>
            一次答對：${correctAnswers} 題<br>
            總準確率：${accuracy}%<br>
            總嘗試次數：${totalAttempts} 次
        `;
    }

    window.onload = autoFetchData;
</script>
</body>
</html>
