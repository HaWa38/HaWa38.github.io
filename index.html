<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎈 兒童趣味拼字挑戰 🎈</title>
    <style>
        :root { 
            --primary: #FF7043; 
            --secondary: #42A5F5; 
            --success: #66BB6A; 
            --error: #EF5350; 
            --bg: #E0F7FA; 
            --text: #455A64;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Comic Sans MS', 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; overflow-x: hidden; }
        
        .card { background: white; padding: 1.5rem; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 480px; text-align: center; position: relative; border: 4px solid white; }
        .hidden { display: none !important; }
        
        h1 { color: var(--primary); margin: 0 0 1rem 0; font-size: 1.8rem; text-shadow: 2px 2px 0px #ffe0b2; }
        
        .settings-group { background: #FFF3E0; padding: 12px; border-radius: 15px; border: 2px dashed #FFB74D; text-align: left; margin-bottom: 15px; }
        .group-title { font-size: 0.95rem; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        select, input[type="number"], input[type="range"] { width: 100%; padding: 10px; border-radius: 10px; border: 2px solid #FFCC80; font-size: 1rem; margin-bottom: 5px; outline: none; }
        
        .btn-mode { flex: 1; background: white; border: 3px solid #FFCC80; color: #8D6E63; padding: 10px; border-radius: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-mode.active { border-color: var(--primary); background: var(--primary); color: white; transform: scale(1.05); box-shadow: 0 5px 15px rgba(255, 112, 67, 0.3); }

        .game-header { display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; width: 100%; margin-bottom: 10px; }
        
        .info-board { display: flex; justify-content: space-between; align-items: center; background: #f5f5f5; padding: 10px 15px; border-radius: 20px; margin-bottom: 15px; border: 2px solid #eee; }
        .score-display { font-size: 1.2rem; font-weight: bold; color: #FBC02D; text-shadow: 1px 1px 0px #FFF; }
        .hearts-display { font-size: 1.2rem; letter-spacing: 2px; }

        .chinese-hint { font-size: 2rem; font-weight: bold; margin: 10px 0; color: var(--secondary); text-shadow: 1px 1px 0px #bbdefb; }
        .spell-display { font-size: 2.5rem; letter-spacing: 4px; color: var(--text); border-bottom: 4px dashed var(--primary); display: inline-block; min-width: 200px; min-height: 3.2rem; margin-bottom: 15px; white-space: pre; }
        
        .letter-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .letter-btn { background: white; border: 3px solid var(--secondary); color: var(--secondary); padding: 12px 2px; border-radius: 15px; font-size: 1.6rem; font-weight: bold; box-shadow: 0 6px 0 var(--secondary); transition: 0.1s; cursor: pointer; }
        .letter-btn:active { transform: translateY(6px); box-shadow: 0 0 0 var(--secondary); }
        
        .btn-primary { background: var(--success); color: white; width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.2rem; margin-top: 5px; box-shadow: 0 6px 0 #388E3C; }
        .btn-outline { background: white; border: 2px solid var(--primary); color: var(--primary); width: 100%; padding: 10px; border-radius: 10px; font-weight: bold; }
        .btn-secondary { background: white; border: 2px solid #B0BEC5; color: #546E7A; padding: 10px; border-radius: 12px; font-size: 1rem; font-weight: bold; box-shadow: 0 4px 0 #B0BEC5; }

        /* 醒目解答看板樣式 */
        .answer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; color: white; animation: fadeIn 0.3s ease-out; }
        .answer-title { font-size: 1.5rem; color: #FFCC80; margin-bottom: 20px; }
        .answer-text { font-size: 4.5rem; font-weight: bold; color: #FFEB3B; text-shadow: 0 0 20px rgba(255,235,59,0.5); letter-spacing: 5px; font-family: 'Consolas', monospace; }
        .answer-zh { font-size: 2rem; margin-top: 10px; color: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-8px);} 75% {transform: translateX(8px);} }
        .shake-anim { animation: shake 0.3s ease-in-out; }

        .particle { position: fixed; pointer-events: none; z-index: 9999; animation: floatUp 1s ease-out forwards; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5); opacity: 1; } 100% { transform: translateY(-150px) scale(1.5); opacity: 0; } }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; border-radius: 25px; padding: 1.5rem; max-height: 80vh; display: flex; flex-direction: column; border: 4px solid var(--primary); }
        .preview-list { overflow-y: auto; flex-grow: 1; border: 2px solid #eee; padding: 10px; background: #fafafa; border-radius: 10px;}
        .preview-item { font-size: 1rem; border-bottom: 1px dashed #ddd; padding: 8px 0; }
    </style>
</head>
<body>

<div id="correct-answer-overlay" class="answer-overlay hidden">
    <div class="answer-title">💡 沒關係，正確拼法是：</div>
    <div class="answer-text" id="big-answer-en">APPLE</div>
    <div class="answer-zh" id="big-answer-zh">蘋果</div>
    <div style="margin-top: 40px; font-size: 1.2rem; color: #AAA;">正在為你準備下一題...</div>
</div>

<div class="card" id="setup-screen">
    <h1>🎈 兒童趣味拼字 🎈</h1>
    <div class="settings-group">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <div class="group-title" style="margin: 0;">📚 1. 選擇單字庫</div>
            <button class="btn-outline" style="width: auto; padding: 4px 10px; font-size: 0.8rem; margin: 0; border-radius:8px;" onclick="toggleModal(true)">👀 偷看字庫</button>
        </div>
        <select id="level-select" onchange="onLevelChange()"></select>
    </div>
    <div class="settings-group">
        <div class="group-title">🎯 2. 挑戰範圍與模式</div>
        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 12px;">
            <div style="flex: 1; display: flex; flex-direction: column;">
                <label style="font-size: 0.8rem; font-weight:bold;">起始</label>
                <input type="number" id="r-start">
            </div>
            <div style="font-weight: bold; color: var(--primary); padding-top: 15px;">~</div>
            <div style="flex: 1; display: flex; flex-direction: column;">
                <label style="font-size: 0.8rem; font-weight:bold;">結束</label>
                <input type="number" id="r-end">
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button id="btn-mode-all" class="btn-mode active" onclick="setMode('all')">🏆 全部挑戰</button>
            <button id="btn-mode-random" class="btn-mode" onclick="setMode('random10')">🎲 隨機 10 題</button>
        </div>
        <input type="hidden" id="quiz-mode" value="all">
    </div>
    <div class="settings-group">
        <div class="group-title">🗣️ 3. 語音小幫手</div>
        <select id="voice-select" style="margin-bottom: 10px;"></select>
        <div style="display: flex; align-items: center; gap: 15px;">
            <input type="range" id="voice-rate" min="0.5" max="2.0" step="0.1" value="1.0" style="flex:1;">
            <button class="btn-outline" style="width:auto; padding: 8px 12px;" onclick="testVoice()">🎵 測試</button>
        </div>
    </div>
    <button class="btn-primary" id="start-btn" disabled onclick="initGame()">🚀 開始遊戲！</button>
</div>

<div id="preview-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3 style="color:var(--primary);">👀 字庫預覽</h3>
        <div class="preview-list" id="modal-list"></div>
        <button class="btn-primary" style="margin-top:10px;" onclick="toggleModal(false)">關閉</button>
    </div>
</div>

<div class="card hidden" id="game-screen">
    <div class="game-header">
        <button class="btn-secondary" style="padding: 5px 10px; font-size: 0.8rem;" onclick="location.reload()">🔙 返回</button>
        <div id="quiz-progress" style="font-weight: bold; color: #795548; font-size: 0.8rem; background: #FFE082; padding: 3px 8px; border-radius: 10px;"></div>
    </div>
    <div class="info-board">
        <div class="hearts-display" id="hearts-display">❤️❤️❤️</div>
        <div class="score-display" id="score-display">⭐ 0</div>
    </div>
    <button onclick="playVoice()" style="font-size: 4rem; background:none; border:none; cursor:pointer;">🔊</button>
    <div class="chinese-hint" id="target-zh"></div>
    <div class="spell-display" id="user-input-display" style="font-family: monospace;"></div>
    <div class="letter-grid" id="keyboard"></div>
    <div style="display: flex; gap: 15px; margin-top: 25px;">
        <button class="btn-secondary" style="flex:1" onclick="backspace()">⬅️ 倒退</button>
        <button class="btn-secondary" style="flex:1" onclick="clearInput()">🗑️ 清除</button>
    </div>
    <div id="feedback" style="margin-top:10px; font-weight:bold;"></div>
</div>

<div class="card hidden" id="result-screen">
    <h1 id="final-stars">⭐⭐⭐</h1>
    <div id="result-body" style="line-height: 1.8; margin: 15px 0; font-size: 1.2rem; background: #f5f5f5; padding: 15px; border-radius: 15px;"></div>
    <div id="funny-feedback" style="font-style: italic; color: #795548; margin-bottom: 20px;"></div>
    <button class="btn-primary" onclick="location.reload()">再玩一次 🚀</button>
</div>

<script>
    let wordData = {}, quizList = [], currentIdx = 0, currentInput = "";
    let attemptsLeft = 3, totalAttempts = 0, correctAnswers = 0, initialQuizCount = 0;
    let score = 0, combo = 0;
    let synth = window.speechSynthesis, voices = [];
    let audioCtx;

    function initVoices() {
        voices = synth.getVoices().filter(v => v.lang.includes('en'));
        document.getElementById('voice-select').innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoices;

    async function autoFetchData() {
        try {
            const response = await fetch('單字庫.TXT', { cache: "no-store" });
            const text = await response.text();
            processData(text);
        } catch (err) { alert("讀取單字庫失敗。"); }
    }

    function processData(text) {
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        lines.forEach(line => {
            if (line.includes("等級")) return;
            const parts = line.split(',');
            if (parts.length >= 3) {
                const lvl = parts[0].trim(), en = parts[1].trim(), zh = parts.slice(2).join(',').trim();
                if (!wordData[lvl]) wordData[lvl] = [];
                wordData[lvl].push({ en, zh });
            }
        });
        const lvls = Object.keys(wordData);
        if (lvls.length > 0) {
            document.getElementById('level-select').innerHTML = lvls.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('start-btn').disabled = false;
            onLevelChange();
        }
    }

    function onLevelChange() {
        const lvl = document.getElementById('level-select').value;
        document.getElementById('r-start').value = 1;
        document.getElementById('r-end').value = wordData[lvl].length;
    }

    function toggleModal(show) {
        if (show) {
            const lvl = document.getElementById('level-select').value;
            document.getElementById('modal-list').innerHTML = wordData[lvl].map((item, i) => 
                `<div class="preview-item">${i+1}. ${item.en} - ${item.zh}</div>`).join('');
            document.getElementById('preview-modal').classList.remove('hidden');
        } else document.getElementById('preview-modal').classList.add('hidden');
    }

    function setMode(mode) {
        document.getElementById('quiz-mode').value = mode;
        document.getElementById('btn-mode-all').classList.toggle('active', mode === 'all');
        document.getElementById('btn-mode-random').classList.toggle('active', mode === 'random10');
    }

    function initGame() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const lvl = document.getElementById('level-select').value;
        const mode = document.getElementById('quiz-mode').value;
        let start = parseInt(document.getElementById('r-start').value) - 1;
        let end = parseInt(document.getElementById('r-end').value);
        if (isNaN(start) || start < 0 || end > wordData[lvl].length) return alert("範圍錯誤");

        let baseList = wordData[lvl].slice(start, end).sort(() => Math.random() - 0.5);
        quizList = (mode === "random10") ? baseList.slice(0, 10) : baseList;
        initialQuizCount = quizList.length; currentIdx = 0; score = 0; correctAnswers = 0;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = quizList[currentIdx];
        currentInput = ""; attemptsLeft = 3;
        updateUI();
        let letters = Array.from(new Set(q.en.replace(/\s/g, '').split('')));
        while (letters.length < 10) {
            let rand = String.fromCharCode(97 + Math.floor(Math.random() * 26));
            if (!letters.includes(rand)) letters.push(rand);
        }
        letters.sort(() => Math.random() - 0.5);
        let kbHTML = letters.map(c => `<button class="letter-btn" onclick="pressKey('${c}')">${c}</button>`).join('');
        if (q.en.includes(" ")) kbHTML += `<button class="letter-btn" style="grid-column: span 2;" onclick="pressKey(' ')">Space</button>`;
        document.getElementById('keyboard').innerHTML = kbHTML;
        setTimeout(playVoice, 500);
    }

    function updateUI() {
        document.getElementById('quiz-progress').innerText = `${currentIdx + 1}/${quizList.length}`;
        document.getElementById('target-zh').innerText = quizList[currentIdx].zh;
        document.getElementById('hearts-display').innerText = "❤️".repeat(attemptsLeft) + "🖤".repeat(3 - attemptsLeft);
        document.getElementById('score-display').innerText = `⭐ ${score}`;
        document.getElementById('user-input-display').innerText = currentInput.replace(/ /g, "_");
        document.getElementById('feedback').innerText = "";
    }

    function pressKey(char) {
        const target = quizList[currentIdx].en;
        currentInput += char;
        document.getElementById('user-input-display').innerText = currentInput.replace(/ /g, "_");
        if (currentInput.length === target.length) {
            if (currentInput === target) {
                if (attemptsLeft === 3) correctAnswers++;
                score += 10;
                playSound('correct');
                document.getElementById('feedback').innerText = "✨ 太棒了！ ✨";
                setTimeout(() => { currentIdx++; if (currentIdx >= quizList.length) showResult(); else loadQuestion(); }, 1000);
            } else handleIncorrect();
        }
    }

    function handleIncorrect() {
        attemptsLeft--;
        playSound('incorrect');
        document.getElementById('game-screen').classList.add('shake-anim');
        setTimeout(() => document.getElementById('game-screen').classList.remove('shake-anim'), 300);
        
        if (attemptsLeft > 0) {
            currentInput = "";
            updateUI();
            document.getElementById('feedback').innerText = "❌ 拼錯了，再試一次！";
        } else {
            // 三次扣完，顯示醒目解答
            showBrightAnswer(quizList[currentIdx]);
        }
    }

    // 【新增】醒目顯示正確答案的功能
    function showBrightAnswer(wordObj) {
        const overlay = document.getElementById('correct-answer-overlay');
        document.getElementById('big-answer-en').innerText = wordObj.en;
        document.getElementById('big-answer-zh').innerText = wordObj.zh;
        overlay.classList.remove('hidden');

        // 自動朗讀兩遍正確答案
        speakTwice(wordObj.en);

        // 將答錯的單字丟到最後面重新挑戰
        quizList.push(wordObj);

        setTimeout(() => {
            overlay.classList.add('hidden');
            currentIdx++;
            if (currentIdx >= quizList.length) showResult();
            else loadQuestion();
        }, 3000); // 停留 3 秒
    }

    function speakTwice(text) {
        synth.cancel();
        const utter1 = new SpeechSynthesisUtterance(text);
        const utter2 = new SpeechSynthesisUtterance(text);
        const vIdx = document.getElementById('voice-select').value;
        utter1.voice = voices[vIdx]; utter2.voice = voices[vIdx];
        utter1.rate = parseFloat(document.getElementById('voice-rate').value);
        utter2.rate = utter1.rate;
        synth.speak(utter1);
        setTimeout(() => synth.speak(utter2), 1000);
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'correct') {
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.2);
        } else {
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
        }
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function playVoice() {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(quizList[currentIdx].en);
        utter.voice = voices[document.getElementById('voice-select').value];
        utter.rate = parseFloat(document.getElementById('voice-rate').value);
        synth.speak(utter);
    }

    function showResult() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const accuracy = Math.round((correctAnswers / initialQuizCount) * 100);
        let msg = accuracy === 100 ? "你是拼字小天才！👑" : accuracy >= 80 ? "超厲害的表現！🚀" : "再接再厲，你變強了！💪";
        document.getElementById('final-stars').innerText = accuracy >= 90 ? "⭐⭐⭐⭐⭐" : accuracy >= 60 ? "⭐⭐⭐" : "⭐";
        document.getElementById('result-body').innerHTML = `得分：${score}<br>正確率：${accuracy}%`;
        document.getElementById('funny-feedback').innerText = msg;
    }

    function backspace() { currentInput = currentInput.slice(0, -1); updateUI(); }
    function clearInput() { currentInput = ""; updateUI(); }
    function testVoice() { speakTwice("Hello, Ready?"); }

    window.onload = autoFetchData;
</script>
</body>
</html>
