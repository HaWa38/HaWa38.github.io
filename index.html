<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字母拼圖 - 等級篩選版</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --error: #d93025; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: var(--bg); padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 2.2rem; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .hidden { display: none !important; }
        h1 { color: var(--primary); font-size: 1.8rem; margin-bottom: 5px; }
        .subtitle { color: #5f6368; margin-bottom: 20px; font-size: 0.9rem; font-weight: bold; }
        .settings-group { background: #f1f3f4; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #e0e0e0; text-align: left; }
        .group-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; color: #3c4043; }
        .setting-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.85rem; }
        .setting-row label { flex: 1; min-width: 70px; }
        select, input[type="number"] { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #dadce0; font-size: 0.9rem; }
        .range-inputs { display: flex; align-items: center; gap: 5px; }
        button { padding: 12px 24px; font-size: 1rem; cursor: pointer; border-radius: 12px; border: none; transition: 0.2s; font-weight: 600; width: 100%; }
        .btn-main { background: var(--primary); color: white; margin-bottom: 12px; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
        .btn-outline { background: white; border: 2px solid #dadce0; color: #3c4043; margin-bottom: 12px; }
        .progress { font-size: 0.9rem; color: #70757a; margin-bottom: 1rem; }
        .spell-display { font-size: 2.2rem; border-bottom: 3px solid var(--primary); margin: 15px auto; min-height: 3.5rem; letter-spacing: 4px; color: var(--primary); font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .letter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .letter-btn { padding: 15px 5px; font-size: 1.3rem; background: #fff; border: 2px solid #dadce0; border-radius: 10px; cursor: pointer; }
        .chinese-hint { font-size: 1.6rem; font-weight: 700; margin: 10px 0; color: #202124; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.2s both; }
    </style>
</head>
<body>

<div class="card" id="home-screen">
    <h1>單字拼圖挑戰</h1>
    <p class="subtitle" id="file-status">正在載入單字庫...</p>
    
    <div class="settings-group">
        <div class="group-title">1. 選擇單字等級</div>
        <select id="level-select" onchange="updateRangeByLevel()">
            <option value="">載入中...</option>
        </select>
    </div>

    <div class="settings-group">
        <div class="group-title">2. 設定測驗範圍 (該等級題號)</div>
        <div class="range-inputs">
            <input type="number" id="range-start" value="1">
            <span>至</span>
            <input type="number" id="range-end" value="10">
        </div>
        <p style="font-size: 0.75rem; color: #666; margin-top: 8px;" id="level-info"></p>
    </div>

    <div class="settings-group">
        <div class="group-title">3. 語音設定</div>
        <div class="setting-row">
            <label>語速</label>
            <input type="range" id="voice-rate" min="0.5" max="1.5" step="0.1" value="1" style="flex:2">
        </div>
        <select id="voice-select"><option value="">等待語音引擎...</option></select>
    </div>

    <button class="btn-main" id="start-btn" onclick="startQuiz()" disabled>等待資源載入...</button>
</div>

<div class="card hidden" id="quiz-screen">
    <div class="progress" id="progress-text">剩餘：--</div>
    <button onclick="speakWord()" style="font-size: 3rem; background:none; border:none; cursor:pointer;">🔊</button>
    <div class="chinese-hint" id="chinese-display"></div>
    <div class="spell-display" id="current-spelling"></div>
    <div class="letter-grid" id="letter-buttons"></div>
    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
        <button class="btn-outline" style="width:auto;" onclick="backspace()">退格</button>
        <button class="btn-outline" style="width:auto;" onclick="clearSpelling()">清除</button>
    </div>
    <div id="message-box" style="margin-top:15px; font-weight:bold; min-height:1.2rem;"></div>
</div>

<div class="card hidden" id="result-screen">
    <h2>測驗完成！</h2>
    <div id="stats-info" style="margin: 20px 0; line-height: 1.6;"></div>
    <button class="btn-main" onclick="location.reload()">回首頁</button>
</div>

<script>
    let fullWordBank = []; // 原始完整資料
    let currentQuestions = [];
    let initialCount = 0;
    let userSpelling = "";
    let wrongCount = 0;
    let totalAttempts = 0;
    let isQuizActive = false;
    let levels = {}; // 存放各等級的索引範圍

    // --- 語音系統修復 ---
    let synth = window.speechSynthesis;
    let voices = [];

    function populateVoiceList() {
        voices = synth.getVoices();
        const voiceSelect = document.getElementById('voice-select');
        const enVoices = voices.filter(v => v.lang.includes('en'));
        
        if (enVoices.length > 0) {
            voiceSelect.innerHTML = enVoices.map((v, i) => 
                `<option value="${voices.indexOf(v)}">${v.name}</option>`
            ).join('');
        }
    }

    if (speechSynthesis.onvoiceschanged !== undefined) {
        speechSynthesis.onvoiceschanged = populateVoiceList;
    }

    // --- 檔案讀取與等級篩選 ---
    async function autoLoadFile() {
        const fileName = "單字庫.TXT";
        try {
            const response = await fetch(`${fileName}?t=${Date.now()}`);
            if (!response.ok) throw new Error();
            const text = await response.text();
            processData(text);
        } catch (error) {
            document.getElementById('file-status').textContent = "⚠️ 找不到單字庫.TXT，請確認檔案位置。";
        }
    }

    function processData(text) {
        const lines = text.split(/\r?\n/);
        fullWordBank = [];
        levels = {};

        lines.forEach((line) => {
            let cleanLine = line.replace(/\/gi, '').trim();
            if (!cleanLine || cleanLine.startsWith('等級')) return;

            const parts = cleanLine.split(',');
            if (parts.length >= 3) {
                const levelName = parts[0].trim();
                const wordObj = { en: parts[1].trim(), zh: parts[2].trim(), level: levelName };
                fullWordBank.push(wordObj);

                // 記錄等級出現的起始與結束位置
                if (!levels[levelName]) {
                    levels[levelName] = { start: fullWordBank.length, end: fullWordBank.length };
                } else {
                    levels[levelName].end = fullWordBank.length;
                }
            }
        });

        if (fullWordBank.length > 0) {
            const levelSelect = document.getElementById('level-select');
            levelSelect.innerHTML = Object.keys(levels).map(lvl => `<option value="${lvl}">${lvl}</option>`).join('');
            
            updateRangeByLevel();
            
            document.getElementById('file-status').textContent = `✅ 已載入 ${fullWordBank.length} 個單字`;
            document.getElementById('start-btn').disabled = false;
            document.getElementById('start-btn').textContent = "開始測驗";
        }
        populateVoiceList(); // 再次嘗試載入語音
    }

    function updateRangeByLevel() {
        const selectedLvl = document.getElementById('level-select').value;
        const info = levels[selectedLvl];
        if (info) {
            // 讓使用者看見的是該等級內的相對題號 (1~N)
            const count = info.end - info.start + 1;
            document.getElementById('range-start').value = 1;
            document.getElementById('range-end').value = count;
            document.getElementById('range-start').max = count;
            document.getElementById('range-end').max = count;
            document.getElementById('level-info').textContent = `* 此等級共有 ${count} 個單字`;
        }
    }

    // --- 遊戲邏輯 ---
    function startQuiz() {
        const selectedLvl = document.getElementById('level-select').value;
        const levelData = fullWordBank.filter(w => w.level === selectedLvl);
        
        const start = Math.max(1, parseInt(document.getElementById('range-start').value)) - 1;
        const end = Math.min(levelData.length, parseInt(document.getElementById('range-end').value));
        
        currentQuestions = levelData.slice(start, end).sort(() => Math.random() - 0.5);
        
        if (currentQuestions.length === 0) { alert("請設定正確的範圍！"); return; }

        initialCount = currentQuestions.length;
        totalAttempts = 0;
        isQuizActive = true;
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestions.length === 0) {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            const score = Math.round((initialCount/totalAttempts)*100);
            document.getElementById('stats-info').innerHTML = `測驗等級：${document.getElementById('level-select').value}<br>總題數：${initialCount}<br>嘗試次數：${totalAttempts}<br><strong>熟練度：${score}%</strong>`;
            return;
        }
        userSpelling = ""; wrongCount = 0;
        const data = currentQuestions[0];
        document.getElementById('chinese-display').textContent = data.zh;
        document.getElementById('current-spelling').textContent = "";
        document.getElementById('message-box').textContent = "";
        document.getElementById('progress-text').textContent = `剩餘：${currentQuestions.length} / ${initialCount}`;
        generateLetters(data.en.toLowerCase());
        speakWord();
    }

    function speakWord() {
        if (!currentQuestions[0]) return;
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(currentQuestions[0].en.replace(/\(.*\)/, ''));
        const voiceIndex = document.getElementById('voice-select').value;
        if (voices[voiceIndex]) utter.voice = voices[voiceIndex];
        utter.rate = document.getElementById('voice-rate').value;
        synth.speak(utter);
    }

    function generateLetters(en) {
        let target = en.replace(/[^a-z]/g, '');
        let letters = target.split('');
        const alpha = "abcdefghijklmnopqrstuvwxyz";
        while(letters.length < target.length + 4) letters.push(alpha[Math.floor(Math.random()*26)]);
        letters.sort(() => Math.random() - 0.5);
        document.getElementById('letter-buttons').innerHTML = letters.map(c => `<button class="letter-btn" onclick="handleInput('${c}')">${c}</button>`).join('');
    }

    function handleInput(c) {
        if (!isQuizActive) return;
        userSpelling += c;
        document.getElementById('current-spelling').textContent = userSpelling.toUpperCase();
        const target = currentQuestions[0].en.toLowerCase().replace(/[^a-z]/g, '');
        if (userSpelling.length === target.length) {
            totalAttempts++;
            if (userSpelling === target) {
                document.getElementById('message-box').textContent = "正確！🌟";
                document.getElementById('message-box').style.color = "var(--success)";
                currentQuestions.shift();
                setTimeout(showQuestion, 800);
            } else {
                wrongCount++;
                document.getElementById('current-spelling').classList.add('shake');
                setTimeout(() => document.getElementById('current-spelling').classList.remove('shake'), 200);
                if (wrongCount >= 3) {
                    document.getElementById('message-box').textContent = `正解：${currentQuestions[0].en.toUpperCase()}`;
                    document.getElementById('message-box').style.color = "var(--error)";
                    currentQuestions.push(currentQuestions.shift());
                    setTimeout(showQuestion, 2000);
                } else {
                    userSpelling = ""; document.getElementById('current-spelling').textContent = "";
                }
            }
        }
    }

    function backspace() { userSpelling = userSpelling.slice(0,-1); document.getElementById('current-spelling').textContent = userSpelling.toUpperCase(); }
    function clearSpelling() { userSpelling = ""; document.getElementById('current-spelling').textContent = ""; }

    window.onload = autoLoadFile;
    window.addEventListener('keydown', (e) => {
        if (!isQuizActive) return;
        if (e.key === 'Backspace') backspace();
        if (e.key.length === 1 && /[a-z]/i.test(e.key)) handleInput(e.key.toLowerCase());
    });
</script>
</body>
</html>
