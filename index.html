<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字母拼圖遊戲</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --error: #d93025; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .hidden { display: none !important; }
        h1 { color: var(--primary); margin-bottom: 1.5rem; }
        
        /* 狀態與上傳區 */
        .status-banner { padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 0.9rem; font-weight: bold; }
        .status-loading { background: #fff3cd; color: #856404; }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }
        
        .upload-hint { border: 2px dashed #dadce0; padding: 15px; border-radius: 12px; margin-bottom: 20px; cursor: pointer; font-size: 0.85rem; color: #70757a; }
        .upload-hint:hover { background: #f1f3f4; }

        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #3c4043; }
        select, input { width: 100%; padding: 12px; border: 1px solid #dadce0; border-radius: 10px; font-size: 1rem; box-sizing: border-box; }
        
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; margin-top: 10px; }
        .btn-primary:disabled { background: #e8eaed; color: #9aa0a6; cursor: not-allowed; }
        .btn-secondary { background: white; border: 2px solid #dadce0; color: #3c4043; margin-top: 10px; }

        /* 遊戲介面 */
        .chinese-text { font-size: 2rem; font-weight: bold; margin: 20px 0; color: #202124; }
        .word-slots { font-size: 2.5rem; letter-spacing: 5px; color: var(--primary); border-bottom: 3px solid var(--primary); display: inline-block; min-width: 150px; min-height: 3.5rem; margin-bottom: 20px; }
        .kb-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .key { background: white; border: 2px solid #dadce0; padding: 15px 5px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #dadce0; }
        .key:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

<div class="card" id="setup-screen">
    <h1>單字拼圖</h1>
    
    <div id="load-status" class="status-banner status-loading">正在嘗試自動載入單字庫...</div>

    <div class="upload-hint" onclick="document.getElementById('file-input').click()">
        <span id="upload-label">若自動載入失敗，請點此手動選取檔案</span>
        <input type="file" id="file-input" accept=".txt" style="display:none" onchange="handleManualFile(this)">
    </div>

    <div class="form-group">
        <label>選擇等級</label>
        <select id="level-select" onchange="updateRangeHint()"></select>
    </div>

    <div class="form-group">
        <label>測驗範圍</label>
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="number" id="r-start" value="1" min="1">
            <span>至</span>
            <input type="number" id="r-end" value="20">
        </div>
        <div id="range-info" style="font-size: 0.75rem; color: #70757a; margin-top: 5px;"></div>
    </div>

    <button class="btn-primary" id="start-btn" disabled onclick="initGame()">開始挑戰</button>
</div>

<div class="card hidden" id="game-screen">
    <div id="quiz-progress" style="text-align: right; color: #70757a; font-size: 0.8rem;"></div>
    <button onclick="playVoice()" style="font-size: 3rem; background:none; border:none; cursor:pointer;">🔊</button>
    <div class="chinese-text" id="target-zh"></div>
    <div class="word-slots" id="user-input-display"></div>
    
    <div class="kb-grid" id="keyboard"></div>
    
    <div style="display: flex; gap: 10px; margin-top: 20px;">
        <button class="btn-secondary" onclick="backspace()">退格</button>
        <button class="btn-secondary" onclick="clearInput()">清除</button>
    </div>
    <div id="feedback" style="margin-top: 15px; font-weight: bold; height: 1.2rem;"></div>
</div>

<div class="card hidden" id="result-screen">
    <h2>測驗結束</h2>
    <div id="result-body" style="line-height: 2; margin: 20px 0;"></div>
    <button class="btn-primary" onclick="location.reload()">重新開始</button>
</div>

<script>
    let wordData = {}; 
    let quizList = [];
    let currentIdx = 0;
    let currentInput = "";
    let errorCount = 0;
    let totalAttempts = 0;

    // --- 核心：檔案讀取邏輯 ---
    // 頁面開啟時，自動嘗試抓取同目錄下的檔案
    async function autoFetchData() {
        const status = document.getElementById('load-status');
        try {
            // 使用相對路徑，發布到 GitHub Pages 後會生效
            const response = await fetch('單字庫.TXT', { cache: "no-cache" });
            if (!response.ok) throw new Error('找不到檔案');
            const text = await response.text();
            processRawText(text);
            status.className = "status-banner status-success";
            status.innerText = "✅ 單字庫自動載入成功！";
        } catch (err) {
            status.className = "status-banner status-error";
            status.innerText = "⚠️ 自動載入失敗（本地預覽限制），請手動選檔。";
            console.warn("Auto-fetch failed. This is normal on local file:// access.");
        }
    }

    function handleManualFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            processRawText(e.target.result);
            const status = document.getElementById('load-status');
            status.className = "status-banner status-success";
            status.innerText = `✅ 手動載入成功：${file.name}`;
            document.getElementById('upload-label').innerText = "✅ 檔案已更換";
        };
        reader.readAsText(file);
    }

    function processRawText(text) {
        wordData = {};
        // 針對您的格式進行解析：LEVEL1,word,translation
        const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
        
        lines.forEach(line => {
            if (line.includes("英文單字")) return; // 跳過標題
            const parts = line.split(',');
            if (parts.length >= 3) {
                const lvl = parts[0].trim();
                const en = parts[1].trim();
                const zh = parts.slice(2).join(',').trim();
                
                if (!wordData[lvl]) wordData[lvl] = [];
                wordData[lvl].push({ en, zh });
            }
        });

        const lvls = Object.keys(wordData);
        if (lvls.length > 0) {
            const select = document.getElementById('level-select');
            select.innerHTML = lvls.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('start-btn').disabled = false;
            updateRangeHint();
        }
    }

    function updateRangeHint() {
        const lvl = document.getElementById('level-select').value;
        const count = wordData[lvl].length;
        document.getElementById('r-end').value = count;
        document.getElementById('range-info').innerText = `此等級共有 ${count} 個單字`;
    }

    // --- 遊戲邏輯 ---
    function initGame() {
        const lvl = document.getElementById('level-select').value;
        const start = parseInt(document.getElementById('r-start').value) - 1;
        const end = parseInt(document.getElementById('r-end').value);
        
        quizList = wordData[lvl].slice(start, end).sort(() => Math.random() - 0.5);
        if (quizList.length === 0) return alert("範圍設定錯誤");

        currentIdx = 0;
        totalAttempts = 0;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = quizList[currentIdx];
        currentInput = "";
        errorCount = 0;
        document.getElementById('quiz-progress').innerText = `進度：${currentIdx + 1} / ${quizList.length}`;
        document.getElementById('target-zh').innerText = q.zh;
        document.getElementById('user-input-display').innerText = "";
        document.getElementById('feedback').innerText = "";
        
        // 生成鍵盤字母 (包含答案字母 + 隨機字母)
        const answer = q.en.toLowerCase().replace(/[^a-z]/g, '');
        let letters = answer.split('');
        const alpha = "abcdefghijklmnopqrstuvwxyz";
        while(letters.length < answer.length + 4) {
            letters.push(alpha[Math.floor(Math.random()*26)]);
        }
        letters.sort(() => Math.random() - 0.5);

        const kb = document.getElementById('keyboard');
        kb.innerHTML = letters.map(char => `<button class="key" onclick="pressKey('${char}')">${char}</button>`).join('');
        playVoice();
    }

    function pressKey(char) {
        const q = quizList[currentIdx];
        const target = q.en.toLowerCase().replace(/[^a-z]/g, '');
        currentInput += char;
        document.getElementById('user-input-display').innerText = currentInput.toUpperCase();

        if (currentInput.length === target.length) {
            totalAttempts++;
            if (currentInput === target) {
                document.getElementById('feedback').innerText = "🌟 答對了！";
                document.getElementById('feedback').style.color = "var(--success)";
                setTimeout(nextQuestion, 800);
            } else {
                errorCount++;
                if (errorCount >= 3) {
                    document.getElementById('feedback').innerText = `正確答案是: ${q.en.toUpperCase()}`;
                    document.getElementById('feedback').style.color = "var(--error)";
                    quizList.push(quizList.splice(currentIdx, 1)[0]); // 移到最後重測
                    setTimeout(loadQuestion, 2000);
                } else {
                    document.getElementById('feedback').innerText = "❌ 拼錯囉，再試一次";
                    document.getElementById('feedback').style.color = "var(--error)";
                    currentInput = "";
                    document.getElementById('user-input-display').innerText = "";
                }
            }
        }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx >= quizList.length) {
            showResult();
        } else {
            loadQuestion();
        }
    }

    function backspace() { currentInput = currentInput.slice(0, -1); document.getElementById('user-input-display').innerText = currentInput.toUpperCase(); }
    function clearInput() { currentInput = ""; document.getElementById('user-input-display').innerText = ""; }

    function playVoice() {
        const msg = new SpeechSynthesisUtterance(quizList[currentIdx].en);
        msg.lang = 'en-US';
        speechSynthesis.speak(msg);
    }

    function showResult() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const accuracy = Math.round((quizList.length / totalAttempts) * 100);
        document.getElementById('result-body').innerHTML = `完成題數：${quizList.length} 題<br>總嘗試次數：${totalAttempts} 次<br>準確度：${accuracy}%`;
    }

    // 初始化自動載入
    window.onload = autoFetchData;
</script>

</body>
</html>
