<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>字母拼圖挑戰</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --error: #d93025; --bg: #f8f9fa; }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        
        .card { background: white; padding: 1.5rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 700px; text-align: center; position: relative; }
        .hidden { display: none !important; }
        h1 { color: var(--primary); margin: 0 0 1rem 0; font-size: 1.5rem; }
        
        /* 狀態列 */
        .status-banner { padding: 8px; border-radius: 10px; margin-bottom: 12px; font-size: 0.85rem; font-weight: bold; }
        .status-loading { background: #fff3cd; color: #856404; }
        .status-success { background: #d4edda; color: #155724; }
        .status-error { background: #f8d7da; color: #721c24; }

        /* 設定區塊佈局優化 */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .settings-group { background: #f1f3f4; padding: 10px; border-radius: 12px; border: 1px solid #e0e0e0; text-align: left; }
        .group-title { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #3c4043; }
        select, input[type="number"] { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #dadce0; font-size: 0.9rem; }
        
        /* 多欄預覽清單 */
        .preview-container { grid-column: span 2; }
        .preview-box { 
            height: 120px; overflow-y: auto; background: white; 
            border: 1px solid #dadce0; border-radius: 8px; padding: 8px;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;
        }
        @media (max-width: 600px) { .preview-box { grid-template-columns: repeat(2, 1fr); } .settings-grid { grid-template-columns: 1fr; } .preview-container { grid-column: span 1; } }
        
        .preview-item { font-size: 0.75rem; color: #5f6368; border-bottom: 1px dashed #eee; padding: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 按鈕風格 */
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        button { width: 100%; padding: 12px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:disabled { background: #e8eaed; color: #9aa0a6; }
        .btn-secondary { background: white; border: 2px solid #dadce0; color: #3c4043; }
        .btn-danger { background: #fce8e6; color: #d93025; border: 1px solid #fad2cf; }

        /* 遊戲介面 */
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .nav-link { color: var(--primary); font-weight: bold; cursor: pointer; font-size: 0.9rem; border:none; background:none; width:auto; padding:0; }
        .chinese-hint { font-size: 1.8rem; font-weight: bold; margin: 10px 0; color: #202124; }
        .spell-display { font-size: 2rem; letter-spacing: 2px; color: var(--primary); border-bottom: 3px solid var(--primary); display: inline-block; min-width: 180px; min-height: 2.8rem; margin-bottom: 15px; font-weight: bold; }
        
        .letter-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .letter-btn { background: white; border: 2px solid #dadce0; padding: 12px 2px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; box-shadow: 0 3px 0 #dadce0; }
        .letter-btn:active { transform: translateY(2px); box-shadow: none; }
        .space-btn { grid-column: span 2; background: #e8f0fe; }

        #feedback { margin-top: 10px; font-weight: bold; height: 1.2rem; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card" id="setup-screen">
    <h1>字母拼圖挑戰</h1>
    <div id="load-status" class="status-banner status-loading">讀取中...</div>

    <div class="settings-grid">
        <div class="settings-group">
            <div class="group-title">1. 選擇等級</div>
            <select id="level-select" onchange="updateRangeHint()"></select>
        </div>
        
        <div class="settings-group">
            <div class="group-title">2. 測驗範圍</div>
            <div style="display: flex; align-items: center; gap: 5px;">
                <input type="number" id="r-start" value="1">
                <span style="font-size:0.8rem">至</span>
                <input type="number" id="r-end" value="10">
            </div>
        </div>

        <div class="settings-group" style="grid-column: span 2;">
            <div class="group-title">3. 語音引擎調整</div>
            <select id="voice-select"></select>
        </div>

        <div class="settings-group preview-container hidden" id="preview-container">
            <div class="group-title">單字預覽 (多欄顯示)</div>
            <div class="preview-box" id="word-preview-list"></div>
        </div>
    </div>

    <button class="btn-primary" id="start-btn" disabled onclick="initGame()">開始挑戰</button>
    <button class="btn-danger" style="margin-top:8px; padding:8px;" onclick="exitProgram()">結束程式</button>
</div>

<div class="card hidden" id="game-screen">
    <div class="top-nav">
        <button class="nav-link" onclick="returnToMain()">← 返回</button>
        <div id="quiz-progress" style="color: #70757a; font-size: 0.8rem; font-weight: bold;"></div>
    </div>

    <button onclick="playVoice()" style="font-size: 2.5rem; background:none; border:none; cursor:pointer;">🔊</button>
    <div class="chinese-hint" id="target-zh"></div>
    <div class="spell-display" id="user-input-display"></div>
    
    <div class="letter-grid" id="keyboard"></div>
    
    <div class="btn-row">
        <button class="btn-secondary" onclick="backspace()">退格</button>
        <button class="btn-secondary" onclick="clearInput()">清除</button>
    </div>
    <div id="feedback"></div>
</div>

<div class="card hidden" id="result-screen">
    <h2>測驗完成！</h2>
    <div id="result-body" style="line-height: 2; margin: 20px 0;"></div>
    <button class="btn-primary" onclick="location.reload()">回首頁</button>
</div>

<script>
    let wordData = {}; 
    let quizList = [];
    let currentIdx = 0;
    let currentInput = "";
    let totalAttempts = 0;
    let synth = window.speechSynthesis;
    let voices = [];

    // 初始化語音
    function initVoices() {
        voices = synth.getVoices().filter(v => v.lang.includes('en'));
        const select = document.getElementById('voice-select');
        select.innerHTML = voices.map((v, i) => `<option value="${i}">${v.name}</option>`).join('');
    }
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = initVoices;

    async function autoFetchData() {
        const statusEl = document.getElementById('load-status');
        try {
            const response = await fetch('單字庫.TXT', { cache: "no-store" });
            const text = await response.text();
            processData(text);
            statusEl.className = "status-banner status-success";
            statusEl.innerText = "✅ 單字庫載入成功";
            initVoices();
        } catch (err) {
            statusEl.className = "status-banner status-error";
            statusEl.innerText = "⚠️ 找不到單字庫.TXT";
        }
    }

    function processData(text) {
        wordData = {};
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        lines.forEach(line => {
            if (line.includes("等級")) return;
            const parts = line.split(',');
            if (parts.length >= 3) {
                const lvl = parts[0].trim(), en = parts[1].trim(), zh = parts.slice(2).join(',').trim();
                if (lvl && en) {
                    if (!wordData[lvl]) wordData[lvl] = [];
                    wordData[lvl].push({ en, zh });
                }
            }
        });
        const lvls = Object.keys(wordData);
        if (lvls.length > 0) {
            document.getElementById('level-select').innerHTML = lvls.map(l => `<option value="${l}">${l}</option>`).join('');
            document.getElementById('start-btn').disabled = false;
            updateRangeHint();
        }
    }

    function updateRangeHint() {
        const lvl = document.getElementById('level-select').value;
        const list = wordData[lvl];
        document.getElementById('r-start').value = 1;
        document.getElementById('r-end').value = list.length;
        document.getElementById('word-preview-list').innerHTML = list.map((item, i) => `<div class="preview-item">${i+1}. ${item.en}</div>`).join('');
        document.getElementById('preview-container').classList.remove('hidden');
    }

    function exitProgram() { if(confirm("確定結束？")) location.href="about:blank"; }
    function returnToMain() { if(confirm("放棄目前進度回主畫面？")) location.reload(); }

    function initGame() {
        const lvl = document.getElementById('level-select').value;
        const start = parseInt(document.getElementById('r-start').value) - 1;
        const end = parseInt(document.getElementById('r-end').value);
        quizList = wordData[lvl].slice(start, end).sort(() => Math.random() - 0.5);
        currentIdx = 0; totalAttempts = 0;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = quizList[currentIdx];
        currentInput = "";
        document.getElementById('quiz-progress').innerText = `${currentIdx + 1} / ${quizList.length}`;
        document.getElementById('target-zh').innerText = q.zh;
        document.getElementById('user-input-display').innerText = "";
        document.getElementById('feedback').innerText = "";
        
        const rawWord = q.en.toLowerCase();
        let letterSet = new Set(rawWord.replace(/[^a-z]/g, '').split('')); 
        let letters = Array.from(letterSet);
        
        const alpha = "abcdefghijklmnopqrstuvwxyz";
        while(letters.length < 10) {
            let rand = alpha[Math.floor(Math.random()*26)];
            if(!letterSet.has(rand)) { letters.push(rand); letterSet.add(rand); }
        }
        letters.sort(() => Math.random() - 0.5);

        let kbHTML = letters.map(c => `<button class="letter-btn" onclick="pressKey('${c}')">${c}</button>`).join('');
        if (rawWord.includes(" ")) kbHTML += `<button class="letter-btn space-btn" onclick="pressKey(' ')">Space</button>`;

        document.getElementById('keyboard').innerHTML = kbHTML;
        playVoice();
    }

    function pressKey(char) {
        const target = quizList[currentIdx].en.toLowerCase();
        currentInput += char;
        document.getElementById('user-input-display').innerText = currentInput.toUpperCase().replace(/ /g, "_");

        if (currentInput.length === target.length) {
            totalAttempts++;
            if (currentInput === target) {
                document.getElementById('feedback').innerText = "🌟 Correct!";
                document.getElementById('feedback').style.color = "var(--success)";
                setTimeout(() => {
                    currentIdx++;
                    if (currentIdx >= quizList.length) showResult(); else loadQuestion();
                }, 800);
            } else {
                document.getElementById('feedback').innerText = "❌ Incorrect, try again.";
                document.getElementById('feedback').style.color = "var(--error)";
                currentInput = ""; document.getElementById('user-input-display').innerText = "";
            }
        }
    }

    function backspace() { currentInput = currentInput.slice(0, -1); document.getElementById('user-input-display').innerText = currentInput.toUpperCase().replace(/ /g, "_"); }
    function clearInput() { currentInput = ""; document.getElementById('user-input-display').innerText = ""; }

    function playVoice() {
        const utter = new SpeechSynthesisUtterance(quizList[currentIdx].en);
        const vIdx = document.getElementById('voice-select').value;
        if(voices[vIdx]) utter.voice = voices[vIdx];
        synth.speak(utter);
    }

    function showResult() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        const acc = Math.round((quizList.length / totalAttempts) * 100);
        document.getElementById('result-body').innerHTML = `等級：${document.getElementById('level-select').value}<br>準確度：${acc}%<br>總嘗試：${totalAttempts}`;
    }

    window.onload = autoFetchData;
</script>
</body>
</html>
