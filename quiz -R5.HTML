<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字母拼圖 - 全庫挑戰版</title>
    <style>
        :root { --primary: #1a73e8; --success: #188038; --error: #d93025; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: var(--bg); }
        
        .card { background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; position: relative; }
        .hidden { display: none !important; }

        h1 { color: var(--primary); font-size: 2.2rem; margin-bottom: 5px; }
        .subtitle { color: #5f6368; margin-bottom: 25px; font-size: 0.9rem; }

        button { padding: 12px 24px; font-size: 1rem; cursor: pointer; border-radius: 12px; border: none; transition: 0.2s; font-weight: 600; }
        .btn-main { background: var(--primary); color: white; width: 100%; margin-bottom: 12px; }
        .btn-main:hover { background: #1557b0; transform: translateY(-2px); }
        .btn-outline { background: white; border: 2px solid #dadce0; color: #3c4043; width: 100%; margin-bottom: 12px; }
        .btn-outline:hover { background: #f1f3f4; }
        .btn-danger { background: #fce8e6; color: #d93025; width: 100%; }
        .btn-danger:hover { background: #fad2cf; }

        .progress { font-size: 0.9rem; color: #70757a; margin-bottom: 1rem; font-weight: bold; }
        .spell-display { font-size: 2.2rem; border-bottom: 3px solid var(--primary); margin: 15px auto; min-height: 3.5rem; width: 90%; letter-spacing: 4px; color: var(--primary); font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .letter-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 15px; }
        .letter-btn { padding: 15px 5px; font-size: 1.3rem; background: #fff; border: 2px solid #dadce0; border-radius: 10px; cursor: pointer; }
        .letter-btn:active { background: #e8f0fe; }

        .chinese-hint { font-size: 1.6rem; font-weight: 700; margin: 10px 0; min-height: 2rem; color: #202124; }
        .hidden-text { visibility: hidden; }

        .badge { background: #e8f0fe; color: var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; margin-top: 5px; display: inline-block; }
        .exit-icon { font-size: 4rem; margin-bottom: 20px; display: block; }
    </style>
</head>
<body>

<!-- 1. 主畫面 -->
<div class="card" id="home-screen">
    <h1>單字拼圖挑戰</h1>
    <p class="subtitle" id="home-subtitle">載入中...</p>
    <div style="max-width: 280px; margin: 0 auto;">
        <button class="btn-main" onclick="startQuiz()">開始全庫測驗</button>
        <button class="btn-outline" onclick="toggleModal(true)">編輯單字庫</button>
        <button class="btn-danger" id="exit-button" onclick="exitApp()">結束程式</button>
    </div>
</div>

<!-- 2. 測驗畫面 -->
<div class="card hidden" id="quiz-screen">
    <div class="progress" id="progress-text">剩餘題目：--</div>
    <div style="font-size: 0.8rem; margin-bottom: 5px;">
        <label><input type="checkbox" id="toggle-chinese" checked onchange="updateChineseVisibility()"> 顯示翻譯</label>
    </div>
    <button onclick="speakWord()" style="font-size: 2.8rem; background:none; border:none; cursor:pointer;">🔊</button>
    <div class="chinese-hint" id="chinese-display"></div>
    <div id="repeat-badge" class="badge hidden">強化練習：這題剛才沒答對喔！</div>
    <div class="spell-display" id="current-spelling"></div>
    <div class="letter-grid" id="letter-buttons"></div>
    <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
        <button class="btn-outline" style="width:auto;" onclick="backspace()">退格 ←</button>
        <button class="btn-outline" style="width:auto;" onclick="clearSpelling()">清除</button>
    </div>
    <div id="message-box" style="margin-top:15px; min-height:24px; font-weight:bold;"></div>
</div>

<!-- 3. 結果畫面 -->
<div class="card hidden" id="result-screen">
    <h2>全庫完成！🌟</h2>
    <p style="color: #5f6368; margin-bottom: 20px;">你已經成功記住單字庫中的所有單字。</p>
    <div id="stats-info" style="margin-bottom: 25px; line-height: 1.6;"></div>
    <button class="btn-main" onclick="location.reload()">再挑戰一次</button>
    <button class="btn-outline" onclick="goHome()">回主選單</button>
</div>

<!-- 4. 結束感謝畫面 -->
<div class="card hidden" id="exit-screen">
    <span class="exit-icon">👋</span>
    <h2>感謝使用！</h2>
    <p style="color: #5f6368;">學習永無止境，期待下次再見。<br>現在您可以安全地關閉此視窗。</p>
    <button class="btn-main" style="margin-top: 20px;" onclick="location.reload()">重新啟動</button>
</div>

<!-- 編輯視窗 -->
<div id="settings-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; justify-content:center; align-items:center;">
    <div style="background:white; padding:25px; border-radius:15px; width:90%; max-width:380px;">
        <h3>編輯單字 (英文,中文)</h3>
        <textarea id="word-input-area" style="width:100%; height:200px; margin:10px 0; padding:10px; border-radius:8px; border:1px solid #ccc; font-family:monospace; resize:none; box-sizing:border-box;"></textarea>
        <div style="display:flex; gap:10px; justify-content:flex-end;">
            <button class="btn-outline" style="width:auto;" onclick="toggleModal(false)">取消</button>
            <button class="btn-main" style="width:auto;" onclick="saveNewWords()">儲存</button>
        </div>
    </div>
</div>

<script>
    const defaultWords = [
        { en: "apple", zh: "蘋果" }, { en: "banana", zh: "香蕉" },
        { en: "orange", zh: "橘子" }, { en: "school", zh: "學校" },
        { en: "flower", zh: "花朵" }, { en: "system", zh: "系統" },
        { en: "happy", zh: "快樂" }, { en: "friend", zh: "朋友" },
        { en: "water", zh: "水" }, { en: "music", zh: "音樂" }
    ];

    let wordBank = JSON.parse(localStorage.getItem('myWordBank')) || defaultWords;
    let currentQuestions = [];
    let initialCount = 0; // 紀錄本輪起始總題數
    let wrongCount = 0;
    let userSpelling = "";
    let firstAttemptCorrect = 0;
    let totalAttempts = 0;

    // 更新主畫面提示文字
    function updateHomeSubtitle() {
        document.getElementById('home-subtitle').textContent = `目前單字庫共有 ${wordBank.length} 個單字`;
    }

    function showScreen(id) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function goHome() {
        updateHomeSubtitle();
        showScreen('home-screen');
    }

    function startQuiz() {
        // 【關鍵修改】：不再 slice(0, 10)，而是取全部單字並隨機排序
        currentQuestions = [...wordBank].sort(() => Math.random() - 0.5);
        initialCount = currentQuestions.length;
        firstAttemptCorrect = 0;
        totalAttempts = 0;
        
        if (initialCount === 0) {
            alert("單字庫是空的！請先編輯單字庫。");
            toggleModal(true);
            return;
        }

        showScreen('quiz-screen');
        showQuestion();
    }

    function showQuestion() {
        if (currentQuestions.length === 0) {
            endQuiz();
            return;
        }
        userSpelling = "";
        wrongCount = 0;
        const currentData = currentQuestions[0];
        document.getElementById('message-box').textContent = "";
        document.getElementById('current-spelling').textContent = "";
        document.getElementById('chinese-display').textContent = currentData.zh;
        // 顯示剩餘數量
        document.getElementById('progress-text').textContent = `剩餘：${currentQuestions.length} 題 / 共 ${initialCount} 題`;
        document.getElementById('repeat-badge').classList.toggle('hidden', !currentData.isRetry);
        generateLetters(currentData.en.toLowerCase());
        updateChineseVisibility();
        speakWord(currentData.en);
    }

    function generateLetters(correct) {
        let letters = correct.split('');
        const alphabet = "abcdefghijklmnopqrstuvwxyz";
        // 增加干擾字母
        for(let i=0; i<3; i++) letters.push(alphabet[Math.floor(Math.random()*26)]);
        letters.sort(() => Math.random() - 0.5);
        const grid = document.getElementById('letter-buttons');
        grid.innerHTML = "";
        letters.forEach(char => {
            const btn = document.createElement('button');
            btn.className = "letter-btn";
            btn.textContent = char;
            btn.onclick = () => {
                userSpelling += char;
                document.getElementById('current-spelling').textContent = userSpelling.toUpperCase();
                if(userSpelling.length === correct.length) checkAnswer();
            };
            grid.appendChild(btn);
        });
    }

    function checkAnswer() {
        const currentData = currentQuestions[0];
        const correct = currentData.en.toLowerCase();
        const msg = document.getElementById('message-box');
        totalAttempts++;
        if(userSpelling.toLowerCase() === correct) {
            msg.textContent = "正確！🌟";
            msg.style.color = "var(--success)";
            if (!currentData.isRetry && wrongCount === 0) firstAttemptCorrect++;
            currentQuestions.shift();
            setTimeout(() => { showQuestion(); }, 800);
        } else {
            wrongCount++;
            if(wrongCount >= 3) {
                msg.textContent = `正解：${correct.toUpperCase()}`;
                msg.style.color = "var(--error)";
                document.getElementById('chinese-display').classList.remove('hidden-text');
                const retryItem = currentQuestions.shift();
                retryItem.isRetry = true;
                currentQuestions.push(retryItem);
                setTimeout(() => { showQuestion(); }, 2500);
            } else {
                msg.textContent = `不對喔，再試一次`;
                msg.style.color = "var(--error)";
                userSpelling = "";
                document.getElementById('current-spelling').textContent = "";
                speakWord(currentData.en);
            }
        }
    }

    function backspace() { userSpelling = userSpelling.slice(0, -1); document.getElementById('current-spelling').textContent = userSpelling.toUpperCase(); }
    function clearSpelling() { userSpelling = ""; document.getElementById('current-spelling').textContent = ""; }
    function speakWord(word) { 
        const u = new SpeechSynthesisUtterance(word);
        u.lang = 'en-US';
        window.speechSynthesis.speak(u);
    }

    function updateChineseVisibility() {
        const v = document.getElementById('toggle-chinese').checked;
        document.getElementById('chinese-display').className = v ? 'chinese-hint' : 'chinese-hint hidden-text';
    }

    function endQuiz() {
        showScreen('result-screen');
        const stats = document.getElementById('stats-info');
        stats.innerHTML = `
            全庫總數：<strong>${initialCount} 個單字</strong><br>
            一次就對：<strong>${firstAttemptCorrect} 個</strong><br>
            總作答次數：<strong>${totalAttempts} 次</strong><br>
            熟練度評分：<strong>${Math.round((initialCount/totalAttempts)*100)}%</strong>
        `;
    }

    function exitApp() {
        if(confirm("確定要結束程式並關閉視窗嗎？")) {
            window.close();
            showScreen('exit-screen');
        }
    }

    function toggleModal(s) {
        document.getElementById('settings-modal').style.display = s ? 'flex' : 'none';
        if(s) document.getElementById('word-input-area').value = wordBank.map(w => `${w.en},${w.zh}`).join('\n');
    }

    function saveNewWords() {
        const lines = document.getElementById('word-input-area').value.trim().split('\n');
        const list = lines.map(l => {
            const p = l.split(',');
            return p.length === 2 ? { en: p[0].trim(), zh: p[1].trim() } : null;
        }).filter(x => x !== null);
        if(list.length > 0) {
            wordBank = list;
            localStorage.setItem('myWordBank', JSON.stringify(list));
            toggleModal(false);
            updateHomeSubtitle();
            startQuiz();
        }
    }

    // 初始化顯示
    updateHomeSubtitle();
</script>

</body>
</html>
